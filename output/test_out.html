<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiliconForge Interactive Layout</title>
<style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a2e;
            --accent: #00d4ff; --accent2: #7c3aed; --accent3: #f59e0b;
            --accent4: #10b981; --accent5: #ef4444; --text-primary: #e8e8f0;
            --text-secondary: #8888a0; --border: #2a2a3e;
        }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', sans-serif; overflow: hidden; }
        .viz-container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }
        
        .viz-toolbar {
            position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 10;
        }
        .viz-toolbar label {
            background: rgba(20,20,35,0.85); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 8px 14px; border-radius: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 6px; user-select: none;
        }
        .viz-toolbar label:hover { border-color: var(--accent); color: var(--accent); }
        .viz-toolbar input { display: none; }
        .viz-toolbar label.active { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); }
        
        .viz-info {
            position: absolute; bottom: 16px; left: 16px; background: rgba(10,10,15,0.9);
            border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);
            backdrop-filter: blur(10px); z-index: 10; display: flex; gap: 16px;
        }
        .viz-info .metric { color: var(--accent); font-weight: 600; }
        
        .viz-label {
            position: absolute; top: 16px; left: 16px; background: rgba(10,10,15,0.9);
            border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent);
            letter-spacing: 0.1em; text-transform: uppercase; backdrop-filter: blur(10px); z-index: 10;
        }
    </style>
</head>
<body>
<div class="viz-container">
  <div class="viz-label">Placement & Routing</div>
  <div class="viz-toolbar">
    <label class="active"><input type="checkbox" id="cb-cells" data-key="cells" checked> Cells</label>
    <label class="active"><input type="checkbox" id="cb-wires" data-key="wires" checked> Wires</label>
    <label><input type="checkbox" id="cb-congestion" data-key="congestion"> Congestion</label>
  </div>
  <div class="viz-info">
    <div>Cells: <span class="metric">2</span></div>
    <div>Wires: <span class="metric">1</span></div>
    <div>Die Size: <span class="metric">100x100 μm</span></div>
  </div>
  <canvas id="canvas"></canvas>
</div>
<script>
const designData = {
  dieArea: { w: 100, h: 100 },
  cells: [
    { id: 0, name: 'G1', type: '', p: [10,10], size: [10,10] },
    { id: 1, name: 'G2', type: '', p: [80,80], size: [10,10] }
  ],
  wires: [
    { layer: 1, p1: [15,15], p2: [85,85], w: 1 }
  ],
  congestion: [
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5],
    [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5]
  ]
};

        const DPR = window.devicePixelRatio || 1;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let scale = 1.0;
        let offset = { x: 0, y: 0 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        
        // Settings
        const config = {
            cells: document.getElementById('cb-cells').checked,
            wires: document.getElementById('cb-wires').checked,
            congestion: document.getElementById('cb-congestion') ? document.getElementById('cb-congestion').checked : false
        };

        // UI Updates
        document.querySelectorAll('.viz-toolbar input').forEach(input => {
            input.addEventListener('change', e => {
                config[e.target.dataset.key] = e.target.checked;
                e.target.parentElement.classList.toggle('active', e.target.checked);
                draw();
            });
        });

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * DPR; canvas.height = height * DPR;
            ctx.scale(DPR, DPR);
            
            if (scale === 1.0 && designData.dieArea) {
                const padding = 60;
                const scaleX = (width - padding*2) / designData.dieArea.w;
                const scaleY = (height - padding*2) / designData.dieArea.h;
                scale = Math.min(scaleX, scaleY);
                offset.x = (width - designData.dieArea.w * scale) / 2;
                offset.y = (height - designData.dieArea.h * scale) / 2;
            }
            draw();
        }
        window.addEventListener('resize', resize);

        // Interaction
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            dragStart = { x: e.clientX - offset.x, y: e.clientY - offset.y };
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            offset.x = e.clientX - dragStart.x;
            offset.y = e.clientY - dragStart.y;
            draw();
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const mouseX = e.clientX, mouseY = e.clientY;
            const wheel = e.deltaY < 0 ? 1.15 : 0.85;
            const newScale = scale * wheel;
            offset.x = mouseX - (mouseX - offset.x) * (newScale / scale);
            offset.y = mouseY - (mouseY - offset.y) * (newScale / scale);
            scale = newScale;
            draw();
        });

        const COLORS = {
            bg: '#0a0a0f', grid: 'rgba(40,40,65,0.4)', die: '#00d4ff30',
            cell_fill: 'rgba(16,185,129,0.15)', cell_stroke: '#10b981',
            wire: ['#00d4ff', '#7c3aed', '#f59e0b', '#ec4899', '#10b981']
        };

        function draw() {
            // Background & Grid
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);

            // Grid lines relative to world scale (only when zoomed in)
            if (scale > 10) {
                ctx.strokeStyle = COLORS.grid;
                ctx.lineWidth = 1/scale;
                const gridSpacing = 10;
                for(let x=0; x<designData.dieArea.w; x+=gridSpacing) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, designData.dieArea.h); ctx.stroke();
                }
                for(let y=0; y<designData.dieArea.h; y+=gridSpacing) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(designData.dieArea.w, y); ctx.stroke();
                }
            }

            // Die Boundary
            if (designData.dieArea) {
                ctx.strokeStyle = COLORS.die;
                ctx.lineWidth = 2 / scale;
                ctx.setLineDash([6/scale, 4/scale]);
                ctx.strokeRect(0, 0, designData.dieArea.w, designData.dieArea.h);
                ctx.setLineDash([]);
            }

            // Congestion Heatmap (Viridis-like)
            if (config.congestion && designData.congestion) {
                const gridY = designData.congestion.length;
                const gridX = designData.congestion[0].length;
                const cellW = designData.dieArea.w / gridX;
                const cellH = designData.dieArea.h / gridY;

                for (let y = 0; y < gridY; y++) {
                    for (let x = 0; x < gridX; x++) {
                        const val = designData.congestion[y][x];
                        if (val > 0.1) {
                            ctx.fillStyle = `rgba(239, 68, 68, ${Math.min(val, 1.0) * 0.8})`;
                            ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
                        }
                    }
                }
            }

            // Cells
            if (config.cells && designData.cells) {
                ctx.fillStyle = COLORS.cell_fill;
                ctx.strokeStyle = COLORS.cell_stroke;
                ctx.lineWidth = 1 / scale;
                
                for (const c of designData.cells) {
                    ctx.fillRect(c.p[0], c.p[1], c.size[0], c.size[1]);
                    if (scale > 0.5) ctx.strokeRect(c.p[0], c.p[1], c.size[0], c.size[1]);
                    
                    // Text label if zoomed in
                    if (scale > 15) {
                        ctx.fillStyle = '#fff';
                        ctx.font = `600 ${8/scale}px JetBrains Mono`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(c.name, c.p[0] + c.size[0]/2, c.p[1] + c.size[1]/2);
                    }
                }
            }

            // Wires (Glow Effect)
            if (config.wires && designData.wires) {
                ctx.lineCap = 'round';
                for (const w of designData.wires) {
                    const c = COLORS.wire[w.layer % COLORS.wire.length];
                    ctx.strokeStyle = c;
                    ctx.lineWidth = Math.max(w.w, 1.5 / scale);
                    ctx.globalAlpha = 0.85;
                    
                    // Glow
                    ctx.shadowColor = c;
                    ctx.shadowBlur = 4 / scale;
                    
                    ctx.beginPath();
                    ctx.moveTo(w.p1[0], w.p1[1]);
                    ctx.lineTo(w.p2[0], w.p2[1]);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();
        }

        // Init
        resize();
    </script>
</body>
</html>
