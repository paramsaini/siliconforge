// ── Foundry-standard color palette (KLayout/Cadence/Synopsys convention) ──
const SEMI_LAYER_COLORS=[0x4444FF,0xFF4444,0x44CC44,0xCCAA33,0xCC44CC,0x44CCCC,0xFF8844,0x8888FF];
const SEMI_LAYER_HEX=['#4444FF','#FF4444','#44CC44','#CCAA33','#CC44CC','#44CCCC','#FF8844','#8888FF'];
const SEMI_LAYER_NAMES=['M1','M2','M3','M4','M5','M6','M7','M8'];
// Cell type colors — muted, professional tones
const CELL_TYPE_COLORS={
  'NAND':0x3a5a8a,'NOR':0x2a6a4a,'INV':0x5a4a7a,'BUF':0x3a6a7a,
  'AND':0x3a5a8a,'OR':0x2a6a4a,'XOR':0x7a6a2a,'XNOR':0x8a5a2a,
  'MUX':0x7a3a5a,'DFF':0x8a3a6a,'LATCH':0x6a3a7a,'AOI':0x2a7a6a,
  'OAI':0x2a7a8a,'HA':0x8a7a2a,'FA':0x8a5a2a,'FILL':0x1a1a1a,
  'CLKBUF':0x3a6a7a,'CLKINV':0x2a5a6a,'TIE':0x222222,'ENDCAP':0x2a2a2a,
  'WELLTAP':0x1e1e1e,'NOT':0x3a6a7a,'DEFAULT':0x333844
};
function cellColor(type){
  if(!type)return CELL_TYPE_COLORS.DEFAULT;
  const up=type.toUpperCase();
  for(const k in CELL_TYPE_COLORS)if(up.includes(k))return CELL_TYPE_COLORS[k];
  // Hash-based fallback — muted professional palette
  let h=0;for(let i=0;i<type.length;i++)h=((h<<5)-h)+type.charCodeAt(i);
  const palette=[0x4a7fbf,0x3da06a,0x7e6eb5,0xb06088,0xb89040,0x4a9ea8,0x6a6eb8,0xc07040,0x5580b8,0x4aa870];
  return palette[Math.abs(h)%palette.length];
}

function create3DScene(container,opts){
  opts=opts||{};
  const w=container.clientWidth||700, h=container.clientHeight||700;
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x040610);
  scene.fog=new THREE.FogExp2(0x040610,opts.fog||0.0008);

  const camera=new THREE.PerspectiveCamera(32,w/h,0.1,20000);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});
  renderer.setSize(w,h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.15;
  renderer.localClippingEnabled=true;
  container.insertBefore(renderer.domElement,container.firstChild);

  // Professional lighting — enhanced for modern look
  const ambient=new THREE.AmbientLight(0x405070,0.7);
  scene.add(ambient);
  const key=new THREE.DirectionalLight(0xffffff,0.85);
  key.position.set(300,500,400);key.castShadow=true;
  key.shadow.mapSize.width=2048;key.shadow.mapSize.height=2048;
  key.shadow.camera.near=10;key.shadow.camera.far=2000;
  key.shadow.camera.left=-500;key.shadow.camera.right=500;
  key.shadow.camera.top=500;key.shadow.camera.bottom=-500;
  key.shadow.bias=-0.0001;
  scene.add(key);
  const fill=new THREE.DirectionalLight(0x5599cc,0.4);
  fill.position.set(-300,200,-300);scene.add(fill);
  const rim=new THREE.DirectionalLight(0x5560c0,0.25);
  rim.position.set(0,100,-400);scene.add(rim);
  const point=new THREE.PointLight(0x3090c0,0.25,1500);
  point.position.set(0,400,0);scene.add(point);

  // Ground plane — gradient fade to dark
  if(!opts.noGround){
    const gGeo=new THREE.PlaneGeometry(5000,5000);
    const gMat=new THREE.MeshPhongMaterial({color:0x040610,transparent:true,opacity:0.95,depthWrite:true});
    const ground=new THREE.Mesh(gGeo,gMat);
    ground.rotation.x=-Math.PI/2;ground.position.y=opts.groundY||-10;ground.receiveShadow=true;
    scene.add(ground);
  }

  // Camera orbit state
  let drag=false,wasDrag=false,prev={x:0,y:0},btn=0;
  let theta=opts.theta||Math.PI/4, phi=opts.phi||Math.PI/3.2;
  let radius=opts.radius||400;
  const defTheta=theta, defPhi=phi, defRadius=radius;
  const center=new THREE.Vector3(opts.cx||0,opts.cy||0,opts.cz||0);
  const defCenter=center.clone();

  // Smooth camera transition targets
  let tgtTheta=null,tgtPhi=null,tgtRadius=null;

  // Raycaster for hover/click
  const raycaster=new THREE.Raycaster();
  const mouse=new THREE.Vector2();
  let lastMouseEvt=null;

  container.addEventListener('mousedown',e=>{drag=true;wasDrag=false;btn=e.button;prev={x:e.clientX,y:e.clientY};e.preventDefault();});
  container.addEventListener('contextmenu',e=>e.preventDefault());
  container.addEventListener('mousemove',e=>{
    // Update mouse for raycaster
    const rect=container.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    lastMouseEvt=e;
    if(!drag)return;
    const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
    if(Math.abs(dx)+Math.abs(dy)>3)wasDrag=true;
    if(btn===0){theta-=dx*0.004;phi=Math.max(0.05,Math.min(Math.PI/2-0.05,phi-dy*0.004));tgtTheta=null;}
    else if(btn===2){
      const s=radius*0.002;
      const right=new THREE.Vector3(-Math.sin(theta),0,Math.cos(theta));
      const fwd=new THREE.Vector3(Math.cos(theta),0,Math.sin(theta));
      center.addScaledVector(right,dx*s);center.addScaledVector(fwd,-dy*s);
    }
    prev={x:e.clientX,y:e.clientY};
  });
  container.addEventListener('mouseup',()=>drag=false);
  container.addEventListener('mouseleave',()=>drag=false);
  container.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY>0?1.08:0.92;
    radius=Math.max(15,Math.min(5000,radius*f));tgtTheta=null;
  },{passive:false});
  container.addEventListener('dblclick',()=>{
    tgtTheta=defTheta;tgtPhi=defPhi;tgtRadius=defRadius;
  });

  // Touch
  let touchDist=0;
  container.addEventListener('touchstart',e=>{
    if(e.touches.length===1){drag=true;wasDrag=false;btn=0;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    if(e.touches.length===2){
      drag=false;
      touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:true});
  container.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){
      const dx=e.touches[0].clientX-prev.x, dy=e.touches[0].clientY-prev.y;
      if(Math.abs(dx)+Math.abs(dy)>3)wasDrag=true;
      theta-=dx*0.004;phi=Math.max(0.05,Math.min(Math.PI/2-0.05,phi-dy*0.004));
      prev={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      radius*=touchDist/Math.max(d,1);radius=Math.max(15,Math.min(5000,radius));touchDist=d;
    }
  },{passive:true});
  container.addEventListener('touchend',()=>drag=false);

  const ctx={scene,camera,renderer,animId:null,radius:()=>radius,theta:()=>theta,phi:()=>phi,center,
    raycaster,mouse,_pickables:[],_labels:[],_hoverCb:null,_clickCb:null,_animCbs:[],
    wasDrag:()=>wasDrag,lastMouseEvt:()=>lastMouseEvt,container};

  // Smooth view transition helper
  ctx.animateTo=function(t,p,r){tgtTheta=t;tgtPhi=p;tgtRadius=r;};
  ctx.resetView=function(){tgtTheta=null;};

  let frameCount=0;
  function animate(){
    ctx.animId=requestAnimationFrame(animate);
    frameCount++;

    // Smooth camera transitions
    if(tgtTheta!==null){
      theta+=(tgtTheta-theta)*0.08;
      phi+=(tgtPhi-phi)*0.08;
      radius+=(tgtRadius-radius)*0.08;
      if(Math.abs(theta-tgtTheta)<0.002&&Math.abs(phi-tgtPhi)<0.002&&Math.abs(radius-tgtRadius)<0.5){
        theta=tgtTheta;phi=tgtPhi;radius=tgtRadius;tgtTheta=null;
      }
    }

    camera.position.set(
      center.x+radius*Math.sin(phi)*Math.cos(theta),
      center.y+radius*Math.cos(phi),
      center.z+radius*Math.sin(phi)*Math.sin(theta)
    );
    camera.lookAt(center);

    // LOD: update cell labels visibility based on distance
    if(ctx._labels.length){
      const showLabels=radius<(opts._labelThresh||120);
      for(const lb of ctx._labels)lb.visible=showLabels;
    }

    // Raycaster hover (throttled every 3 frames)
    if(frameCount%3===0&&ctx._pickables.length&&ctx._hoverCb){
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(ctx._pickables);
      ctx._hoverCb(hits,lastMouseEvt);
    }

    // Custom animation callbacks
    for(const cb of ctx._animCbs)cb(frameCount);

    renderer.render(scene,camera);
  }
  animate();
  _3dScenes.push(ctx);

  // Click handler
  container.addEventListener('click',e=>{
    if(wasDrag)return;
    if(ctx._clickCb&&ctx._pickables.length){
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(ctx._pickables);
      ctx._clickCb(hits,e);
    }
  });

  const ro=new ResizeObserver(()=>{
    const nw=container.clientWidth, nh=container.clientHeight;
    if(nw>0&&nh>0){camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);}
  });
  ro.observe(container);
  return ctx;
}

function makeTextSprite(text,color,size){
  const c=document.createElement('canvas');
  const s=size||512;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  c.width=s*dpr;c.height=(s/4)*dpr;
  const g=c.getContext('2d');
  g.scale(dpr,dpr);
  g.clearRect(0,0,s,s/4);
  // Shadow for readability
  g.shadowColor='rgba(0,0,0,0.6)';g.shadowBlur=3;g.shadowOffsetY=1;
  g.font='bold '+(s/5)+'px JetBrains Mono,monospace';
  g.fillStyle=color||'#94a3b8';
  g.textAlign='center';g.textBaseline='middle';
  g.fillText(text,s/2,s/8);
  g.shadowBlur=0;
  const tex=new THREE.CanvasTexture(c);
  tex.minFilter=THREE.LinearFilter;tex.generateMipmaps=false;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.9,depthTest:false});
  return new THREE.Sprite(mat);
}

function build3DPlacement(container,ph){
  if(!container||typeof THREE==='undefined')return;
  const dw=(ph.die||{}).w||200, dh=(ph.die||{}).h||200;
  const sc=280/Math.max(dw,dh);
  const ox=-dw*sc/2, oz=-dh*sc/2;
  const R=Math.max(dw,dh)*sc;
  const cells=ph.cells||[];
  const wires=(ph.wires||[]).slice(0,2000);

  const ctx=create3DScene(container,{
    radius:R*1.3,phi:Math.PI/3.2,theta:Math.PI/4.5,fog:0.0004,cy:8,
    _labelThresh:R*0.55,groundY:-6
  });
  const scene=ctx.scene;

  // ── Die substrate — clean silicon look ──
  const dieW=dw*sc, dieH=dh*sc;
  // Package/PCB base with beveled edges
  const baseGeo=new THREE.BoxGeometry(dieW+10,3,dieH+10);
  const baseMat=new THREE.MeshPhongMaterial({color:0x12142a,specular:0x222240,shininess:30});
  const base=new THREE.Mesh(baseGeo,baseMat);
  base.position.set(0,-3.5,0);base.receiveShadow=true;scene.add(base);

  // Active silicon die
  const dieGeo=new THREE.BoxGeometry(dieW,1.2,dieH);
  const dieMat=new THREE.MeshPhongMaterial({color:0x0e1420,specular:0x1c2040,shininess:50});
  const die=new THREE.Mesh(dieGeo,dieMat);
  die.position.set(0,-0.6,0);die.receiveShadow=true;scene.add(die);

  // Die edge glow — subtle accent
  const edgeGeo=new THREE.EdgesGeometry(new THREE.BoxGeometry(dieW+0.3,1.4,dieH+0.3));
  const edgeMat=new THREE.LineBasicMaterial({color:0x2855aa,transparent:true,opacity:0.3});
  const edges=new THREE.LineSegments(edgeGeo,edgeMat);
  edges.position.y=-0.3;scene.add(edges);

  // Placement row grid
  const gridDiv=Math.min(60,Math.max(10,Math.round(Math.max(dw,dh)/4)));
  const gridHelper=new THREE.GridHelper(Math.max(dieW,dieH),gridDiv,0x182848,0x0c1428);
  gridHelper.position.y=0.01;scene.add(gridHelper);

  // ── Congestion heatmap overlay on die surface ──
  let heatMesh=null;
  if(cells.length>4){
    const gridRes=32;
    const heatCanvas=document.createElement('canvas');
    heatCanvas.width=gridRes;heatCanvas.height=gridRes;
    const hctx=heatCanvas.getContext('2d');
    const bins=new Float32Array(gridRes*gridRes);
    for(const c of cells){
      const gx=Math.floor(Math.min(Math.max((c.x||0)/dw,0),0.999)*gridRes);
      const gy=Math.floor(Math.min(Math.max((c.y||0)/dh,0),0.999)*gridRes);
      bins[gy*gridRes+gx]++;
    }
    const maxBin=Math.max(...bins,1);
    const imgData=hctx.createImageData(gridRes,gridRes);
    for(let i=0;i<bins.length;i++){
      const t=bins[i]/maxBin;
      // Cool→warm: blue(0)→cyan(0.25)→green(0.5)→yellow(0.75)→red(1)
      let r_,g_,b_;
      if(t<0.25){r_=0;g_=t*4*180;b_=200+t*4*55;}
      else if(t<0.5){r_=(t-0.25)*4*100;g_=180+((t-0.25)*4)*75;b_=255-(t-0.25)*4*255;}
      else if(t<0.75){r_=100+(t-0.5)*4*155;g_=255-(t-0.5)*4*100;b_=0;}
      else{r_=255;g_=155-(t-0.75)*4*155;b_=0;}
      imgData.data[i*4]=Math.round(r_);imgData.data[i*4+1]=Math.round(g_);
      imgData.data[i*4+2]=Math.round(b_);imgData.data[i*4+3]=Math.round(t*160);
    }
    hctx.putImageData(imgData,0,0);
    const heatTex=new THREE.CanvasTexture(heatCanvas);
    heatTex.magFilter=THREE.LinearFilter;heatTex.minFilter=THREE.LinearFilter;
    const hGeo=new THREE.PlaneGeometry(dieW,dieH);
    const hMat=new THREE.MeshBasicMaterial({map:heatTex,transparent:true,opacity:0.4,depthWrite:false});
    heatMesh=new THREE.Mesh(hGeo,hMat);
    heatMesh.rotation.x=-Math.PI/2;heatMesh.position.y=0.08;
    heatMesh.visible=false;scene.add(heatMesh);
  }

  // ── Cells as solid blocks with entrance animation ──
  const typeColors={};
  const STD_CELL_H=2.0, DFF_CELL_H=2.8, FILL_CELL_H=0.8;
  const cellMeshes=[];
  const centerX=0, centerZ=0;
  for(let ci=0;ci<cells.length;ci++){
    const c=cells[ci];
    const cw=Math.max((c.w||2)*sc,0.5);
    const cd=Math.max((c.h||10)*sc,0.5);
    const up=(c.type||'').toUpperCase();
    const ch=up.includes('FILL')||up.includes('TAP')||up.includes('WELLTAP')||up.includes('ENDCAP')?FILL_CELL_H:
             up.includes('DFF')||up.includes('LATCH')?DFF_CELL_H:STD_CELL_H;
    const color=cellColor(c.type);
    if(!typeColors[c.type||'DEFAULT'])typeColors[c.type||'DEFAULT']=color;

    const geo=new THREE.BoxGeometry(cw,ch,cd);
    const mat=new THREE.MeshPhongMaterial({
      color:color,transparent:false,
      emissive:color,emissiveIntensity:0.02,
      specular:0x222222,shininess:20,
    });
    const mesh=new THREE.Mesh(geo,mat);
    const px=ox+c.x*sc+cw/2, pz=oz+c.y*sc+cd/2;
    const targetY=ch/2;
    mesh.position.set(px,ch/2,pz);  // place at final position immediately
    mesh.castShadow=true;mesh.receiveShadow=true;
    mesh.userData={name:c.name||c.type||('C'+c.id),type:c.type||'',x:c.x||0,y:c.y||0,w:c.w||2,h:c.h||10};
    scene.add(mesh);
    ctx._pickables.push(mesh);

    // Thin dark outline
    const topGeo=new THREE.EdgesGeometry(geo);
    const topMat=new THREE.LineBasicMaterial({color:0x000000,transparent:true,opacity:0.25});
    const topLine=new THREE.LineSegments(topGeo,topMat);
    topLine.position.copy(mesh.position);scene.add(topLine);

    // Cell name label (visible only when zoomed in)
    const label=c.name||c.type||('C'+c.id);
    const spriteSize=Math.max(cw,cd)*6;
    const sprite=makeTextSprite(label,'#'+color.toString(16).padStart(6,'0'),Math.max(128,Math.min(512,Math.round(spriteSize*8))));
    sprite.scale.set(Math.max(cw*1.2,4),Math.max(cd*0.3,1),1);
    sprite.position.set(px,ch+0.8,pz);
    sprite.visible=false;
    scene.add(sprite);
    ctx._labels.push(sprite);

    // Stagger delay based on distance from center
    const dist=Math.sqrt((px-centerX)**2+(pz-centerZ)**2);
    const delay=dist/(R||1)*25;
    cellMeshes.push({mesh,outline:topLine,label:sprite,targetY,ch,delay});
  }

  // ── Cells placed at final positions (no entrance animation) ──
  for(const cm of cellMeshes){
    cm.outline.position.copy(cm.mesh.position);
    cm.label.position.set(cm.mesh.position.x,cm.ch+0.8,cm.mesh.position.z);
  }

  // ── Tooltip on hover ──
  const tooltip=document.getElementById('place-tooltip');
  let hoveredCell=null;
  if(tooltip){
    ctx._hoverCb=function(hits,evt){
      if(!evt)return;
      const rect=ctx.container.getBoundingClientRect();
      if(hits.length>0){
        const d=hits[0].object.userData;
        tooltip.style.display='block';
        tooltip.innerHTML='<b>'+d.name+'</b><br><span class="tt-type">'+d.type+'</span><br>Pos: '+d.x.toFixed(1)+', '+d.y.toFixed(1)+'<br>Size: '+d.w.toFixed(1)+' &times; '+d.h.toFixed(1);
        tooltip.style.left=(evt.clientX-rect.left+14)+'px';
        tooltip.style.top=(evt.clientY-rect.top-40)+'px';
        if(hoveredCell&&hoveredCell!==hits[0].object)hoveredCell.material.emissiveIntensity=0.02;
        hits[0].object.material.emissiveIntensity=0.15;
        hoveredCell=hits[0].object;
      }else{
        tooltip.style.display='none';
        if(hoveredCell){hoveredCell.material.emissiveIntensity=0.02;hoveredCell=null;}
      }
    };
  }

  // ── Wires with layer-specific coloring ──
  const placeWires=(ph.wires||[]).slice(0,4000);
  for(const w of placeWires){
    const l=w.layer||0;
    const lc=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
    const y=STD_CELL_H+1.5+l*2.5;
    const x1=ox+w.x1*sc, z1=oz+w.y1*sc, x2=ox+w.x2*sc, z2=oz+w.y2*sc;
    const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
    if(len<0.01)continue;
    const thick=0.6+l*0.15;
    const wireH=0.35+l*0.05;
    const wGeo=new THREE.BoxGeometry(len,wireH,thick);
    const wMat=new THREE.MeshPhongMaterial({
      color:lc,transparent:false,opacity:1.0,
      emissive:lc,emissiveIntensity:0.02,
      specular:0x222222,shininess:20,
    });
    const wMesh=new THREE.Mesh(wGeo,wMat);
    wMesh.position.set((x1+x2)/2,y,(z1+z2)/2);
    wMesh.rotation.y=Math.atan2(z2-z1,x2-x1);
    scene.add(wMesh);
  }

  // ── Minimap (2D top-down) ──
  const minimapCv=document.getElementById('place-minimap-cv');
  if(minimapCv&&cells.length){
    const mw=140,mh=140,mctx=minimapCv.getContext('2d');
    minimapCv.width=mw*2;minimapCv.height=mh*2;mctx.scale(2,2);
    mctx.fillStyle='#06080f';mctx.fillRect(0,0,mw,mh);
    // Die outline
    const pad=8;const sw=(mw-2*pad)/dw,sh=(mh-2*pad)/dh,ms=Math.min(sw,sh);
    const mx0=pad+(mw-2*pad-dw*ms)/2,my0=pad+(mh-2*pad-dh*ms)/2;
    mctx.strokeStyle='rgba(56,189,248,0.3)';mctx.lineWidth=0.5;
    mctx.strokeRect(mx0,my0,dw*ms,dh*ms);
    // Cells as colored dots
    for(const c of cells){
      const cx=mx0+(c.x||0)*ms,cy=my0+(c.y||0)*ms;
      const color=cellColor(c.type);
      mctx.fillStyle='#'+color.toString(16).padStart(6,'0')+'88';
      mctx.fillRect(cx,cy,Math.max(1,(c.w||2)*ms),Math.max(1,(c.h||10)*ms));
    }
  }

  // ── Legend ──
  const legend=document.getElementById('place-legend');
  if(legend){
    let lh='<div class="legend-title">Cell Types</div>';
    const shown=new Set();
    for(const [t,c] of Object.entries(typeColors)){
      if(shown.size>=10)break;
      const hex='#'+c.toString(16).padStart(6,'0');
      const short=t.length>12?t.slice(0,12)+'…':t;
      lh+='<div class="layer-legend-item"><span class="swatch" style="background:'+hex+';box-shadow:0 0 6px '+hex+'"></span>'+short+'</div>';
      shown.add(t);
    }
    lh+='<hr style="border:none;border-top:1px solid rgba(148,163,184,0.1);margin:6px 0">';
    lh+='<div class="legend-title">Metal Layers</div>';
    const nLayers=Math.max(ph.num_layers||3,1);
    for(let l=0;l<Math.min(nLayers,6);l++){
      lh+='<div class="layer-legend-item"><span class="swatch" style="background:'+SEMI_LAYER_HEX[l]+';box-shadow:0 0 6px '+SEMI_LAYER_HEX[l]+'"></span>'+SEMI_LAYER_NAMES[l]+'</div>';
    }
    legend.innerHTML=lh;
  }

  // Stats
  const stats=document.getElementById('place-stats');
  if(stats)stats.textContent=cells.length+' cells · '+wires.length+' wires · '+(dw).toFixed(0)+'×'+(dh).toFixed(0)+' µm';

  // Toolbar — smooth animated transitions
  const tb=document.getElementById('place-tb');
  if(tb){
    let tbh='<button class="active" id="pb-3d">3D View</button>';
    tbh+='<button id="pb-top">Top Down</button>';
    tbh+='<button id="pb-front">Front</button>';
    if(heatMesh)tbh+='<button id="pb-heat">Heatmap</button>';
    tb.innerHTML=tbh;
    function placeViewBtn(id,th,ph_,r){
      document.getElementById(id).addEventListener('click',function(){
        document.querySelectorAll('#place-tb button:not(#pb-heat)').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        if(th===null)ctx.resetView(); else ctx.animateTo(th,ph_,r);
      });
    }
    placeViewBtn('pb-3d',null,0,0);
    placeViewBtn('pb-top',0,0.05,R*0.8);
    placeViewBtn('pb-front',0,Math.PI/2-0.05,R*1.2);
    if(heatMesh){
      document.getElementById('pb-heat').addEventListener('click',function(){
        heatMesh.visible=!heatMesh.visible;
        this.classList.toggle('active',heatMesh.visible);
      });
    }
  }
}

function build3DRouting(container,ph){
  if(!container||typeof THREE==='undefined')return;
  const dw=(ph.die||{}).w||200, dh=(ph.die||{}).h||200;
  const nLayers=Math.max(ph.num_layers||3,1);
  const sc=280/Math.max(dw,dh);
  const ox=-dw*sc/2, oz=-dh*sc/2;
  const dieW=dw*sc, dieH=dh*sc;
  const layerSpacing=12;
  const R=Math.max(dw,dh)*sc;

  const ctx=create3DScene(container,{
    radius:R*1.6,phi:Math.PI/3.5,theta:Math.PI/5,fog:0.0003,
    cy:nLayers*layerSpacing/2,groundY:-8
  });
  const scene=ctx.scene;

  // Track layer groups for toggling
  const layerGroups=[];
  for(let i=0;i<nLayers;i++)layerGroups.push(new THREE.Group());
  const viaGroup=new THREE.Group();
  scene.add(viaGroup);

  // ── Substrate — silicon wafer look ──
  const subGeo=new THREE.BoxGeometry(dieW+8,4,dieH+8);
  const subMat=new THREE.MeshPhongMaterial({color:0x12142a,specular:0x222240,shininess:35});
  const sub=new THREE.Mesh(subGeo,subMat);
  sub.position.set(0,-5,0);sub.receiveShadow=true;scene.add(sub);

  // Active silicon layer
  const siGeo=new THREE.BoxGeometry(dieW+1,2,dieH+1);
  const siMat=new THREE.MeshPhongMaterial({color:0x0e1420,specular:0x1c2040,shininess:45});
  const si=new THREE.Mesh(siGeo,siMat);
  si.position.set(0,-2.5,0);si.receiveShadow=true;scene.add(si);

  // ── Layer planes + borders + labels ──
  const layerHeatMeshes=[];
  for(let l=0;l<nLayers;l++){
    const y=l*layerSpacing;
    const color=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
    const group=layerGroups[l];
    scene.add(group);

    // ILD plane
    const pGeo=new THREE.PlaneGeometry(dieW,dieH);
    const pMat=new THREE.MeshPhongMaterial({color:0x080e1c,transparent:true,opacity:0.08,side:THREE.DoubleSide});
    const plane=new THREE.Mesh(pGeo,pMat);
    plane.rotation.x=-Math.PI/2;plane.position.y=y;
    group.add(plane);

    // Border
    const bGeo=new THREE.EdgesGeometry(pGeo);
    const bMat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.35});
    const border=new THREE.LineSegments(bGeo,bMat);
    border.rotation.x=-Math.PI/2;border.position.y=y;
    group.add(border);

    // Corner accent lines
    const cornerLen=dieW*0.05;
    const corners=[
      [[-dieW/2,y,-dieH/2],[-dieW/2+cornerLen,y,-dieH/2]],
      [[-dieW/2,y,-dieH/2],[-dieW/2,y,-dieH/2+cornerLen]],
      [[dieW/2,y,-dieH/2],[dieW/2-cornerLen,y,-dieH/2]],
      [[dieW/2,y,-dieH/2],[dieW/2,y,-dieH/2+cornerLen]],
      [[-dieW/2,y,dieH/2],[-dieW/2+cornerLen,y,dieH/2]],
      [[-dieW/2,y,dieH/2],[-dieW/2,y,dieH/2-cornerLen]],
      [[dieW/2,y,dieH/2],[dieW/2-cornerLen,y,dieH/2]],
      [[dieW/2,y,dieH/2],[dieW/2,y,dieH/2-cornerLen]],
    ];
    for(const [a,b] of corners){
      const cGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a),new THREE.Vector3(...b)]);
      const cMat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.4});
      group.add(new THREE.Line(cGeo,cMat));
    }

    // Layer label sprite
    const sprite=makeTextSprite(SEMI_LAYER_NAMES[l]||('M'+(l+1)),SEMI_LAYER_HEX[l%SEMI_LAYER_HEX.length],512);
    sprite.scale.set(18,4.5,1);
    sprite.position.set(-dieW/2-16,y,0);
    group.add(sprite);

    // Right side: layer pitch/width info
    const layers=ph.layers||[];
    if(layers[l]){
      const info=layers[l].horizontal?'H ':'V ';
      const sprite2=makeTextSprite(info+'P:'+(layers[l].pitch||0).toFixed(1),SEMI_LAYER_HEX[l%SEMI_LAYER_HEX.length],512);
      sprite2.scale.set(16,4,1);
      sprite2.position.set(dieW/2+16,y,0);
      group.add(sprite2);
    }
  }

  // ── Wires with animated entrance ──
  const wires=(ph.wires||[]).slice(0,6000);
  const wireAnims=[];
  for(const w of wires){
    const l=w.layer||0;
    if(l>=nLayers)continue;
    const y=l*layerSpacing;
    const lc=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
    const x1=ox+w.x1*sc, z1=oz+w.y1*sc;
    const x2=ox+w.x2*sc, z2=oz+w.y2*sc;
    const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
    if(len<0.01)continue;

    const thick=0.8+Math.min(l,5)*0.2;
    const wireH=0.5+Math.min(l,5)*0.1;
    const wGeo=new THREE.BoxGeometry(len,wireH,thick);
    const isUpper=l>=5;
    const wMat=new THREE.MeshPhongMaterial({
      color:lc,transparent:false,opacity:1.0,
      emissive:lc,emissiveIntensity:0.01,
      specular:0x222222,shininess:20,
    });
    const wMesh=new THREE.Mesh(wGeo,wMat);
    wMesh.position.set((x1+x2)/2,y+wireH/2,(z1+z2)/2);
    wMesh.rotation.y=Math.atan2(z2-z1,x2-x1);
    wMesh.castShadow=true;
    wMesh.userData={layer:l,net_id:w.net_id||0};
    layerGroups[l].add(wMesh);
    ctx._pickables.push(wMesh);
  }

  // ── Vias as cylindrical contact pillars ──
  const vias=(ph.vias||[]).slice(0,2500);
  for(const v of vias){
    const lo=Math.min(v.lower||0,v.upper||0);
    const hi=Math.max(v.lower||0,v.upper||0);
    const y0=lo*layerSpacing;
    const y1=hi*layerSpacing;
    const vH=Math.max(y1-y0,layerSpacing*0.3);
    const vx=ox+(v.x||0)*sc, vz=oz+(v.y||0)*sc;

    // Cylindrical via pillar — metallic look
    const vGeo=new THREE.CylinderGeometry(0.45,0.45,vH,8);
    const vMat=new THREE.MeshPhongMaterial({
      color:0xd0d0d0,specular:0x444444,shininess:30,
      emissive:0x101010,emissiveIntensity:0.01,
    });
    const viaMesh=new THREE.Mesh(vGeo,vMat);
    viaMesh.position.set(vx,(y0+y1)/2,vz);
    viaGroup.add(viaMesh);

    // Circular landing pads at each layer
    for(const ly of [lo,hi]){
      const padGeo=new THREE.CylinderGeometry(0.9,0.9,0.25,8);
      const padColor=SEMI_LAYER_COLORS[ly%SEMI_LAYER_COLORS.length];
      const padMat=new THREE.MeshPhongMaterial({
        color:padColor,emissive:padColor,emissiveIntensity:0.01,
        specular:0x444444,shininess:45,
      });
      const pad=new THREE.Mesh(padGeo,padMat);
      pad.position.set(vx,ly*layerSpacing,vz);
      viaGroup.add(pad);
    }
  }

  // ── Congestion heatmap per layer (toggled by toolbar) ──
  const heatGroup=new THREE.Group();heatGroup.visible=false;scene.add(heatGroup);
  if(wires.length>10){
    const gridRes=24;
    for(let l=0;l<nLayers;l++){
      const layerWires=wires.filter(w=>(w.layer||0)===l);
      if(!layerWires.length)continue;
      const hc=document.createElement('canvas');hc.width=gridRes;hc.height=gridRes;
      const hctx=hc.getContext('2d');
      const bins=new Float32Array(gridRes*gridRes);
      for(const w of layerWires){
        const mx=((w.x1+w.x2)/2)/dw, my=((w.y1+w.y2)/2)/dh;
        const gx=Math.floor(Math.min(Math.max(mx,0),0.999)*gridRes);
        const gy=Math.floor(Math.min(Math.max(my,0),0.999)*gridRes);
        bins[gy*gridRes+gx]++;
      }
      const maxB=Math.max(...bins,1);
      const imgD=hctx.createImageData(gridRes,gridRes);
      for(let i=0;i<bins.length;i++){
        const t=bins[i]/maxB;
        let r_,g_,b_;
        if(t<0.33){r_=0;g_=t*3*200;b_=200+t*3*55;}
        else if(t<0.66){r_=(t-0.33)*3*255;g_=200;b_=255-(t-0.33)*3*255;}
        else{r_=255;g_=200-(t-0.66)*3*200;b_=0;}
        imgD.data[i*4]=Math.round(r_);imgD.data[i*4+1]=Math.round(g_);
        imgD.data[i*4+2]=Math.round(b_);imgD.data[i*4+3]=Math.round(t*140);
      }
      hctx.putImageData(imgD,0,0);
      const htex=new THREE.CanvasTexture(hc);htex.magFilter=THREE.LinearFilter;
      const hGeo=new THREE.PlaneGeometry(dieW,dieH);
      const hMat=new THREE.MeshBasicMaterial({map:htex,transparent:true,opacity:0.5,depthWrite:false});
      const hMesh=new THREE.Mesh(hGeo,hMat);
      hMesh.rotation.x=-Math.PI/2;hMesh.position.y=l*layerSpacing+0.15;
      heatGroup.add(hMesh);
    }
  }

  // ── Wire hover tooltip ──
  const tooltip=document.getElementById('route-tooltip');
  let hoveredWire=null;
  if(tooltip){
    ctx._hoverCb=function(hits,evt){
      if(!evt)return;
      const rect=ctx.container.getBoundingClientRect();
      if(hits.length>0){
        const d=hits[0].object.userData;
        tooltip.style.display='block';
        tooltip.innerHTML='<b>'+SEMI_LAYER_NAMES[d.layer||0]+'</b> wire'+(d.net_id?' · Net '+d.net_id:'');
        tooltip.style.left=(evt.clientX-rect.left+14)+'px';
        tooltip.style.top=(evt.clientY-rect.top-30)+'px';
        if(hoveredWire&&hoveredWire!==hits[0].object)hoveredWire.material.emissiveIntensity=0.01;
        hits[0].object.material.emissiveIntensity=0.15;
        hoveredWire=hits[0].object;
      }else{
        tooltip.style.display='none';
        if(hoveredWire){hoveredWire.material.emissiveIntensity=0.01;hoveredWire=null;}
      }
    };
  }

  // ── Layer toggle pills (bottom bar) ──
  const toggleRow=document.getElementById('route-layers');
  if(toggleRow){
    let th='';
    for(let l=0;l<nLayers;l++){
      const hex=SEMI_LAYER_HEX[l%SEMI_LAYER_HEX.length];
      const wCount=wires.filter(w=>(w.layer||0)===l).length;
      th+='<div class="layer-pill active" data-layer="'+l+'" style="--lc:'+hex+'"><span class="pill-swatch" style="background:'+hex+';box-shadow:0 0 5px '+hex+'"></span>'+SEMI_LAYER_NAMES[l]+' <span style="opacity:0.5;font-size:9px">'+wCount+'</span></div>';
    }
    th+='<div class="layer-pill active" data-layer="vias" style="--lc:#c0c0c0"><span class="pill-swatch" style="background:#c0c0c0"></span>Vias <span style="opacity:0.5;font-size:9px">'+vias.length+'</span></div>';
    toggleRow.innerHTML=th;
    toggleRow.querySelectorAll('.layer-pill').forEach(el=>{
      el.addEventListener('click',()=>{
        const ly=el.dataset.layer;
        el.classList.toggle('active');el.classList.toggle('off');
        const vis=el.classList.contains('active');
        if(ly==='vias')viaGroup.visible=vis;
        else{const idx=parseInt(ly);if(layerGroups[idx])layerGroups[idx].visible=vis;}
      });
    });
  }

  // ── Legend (compact, right side) ──
  const legend=document.getElementById('route-legend');
  if(legend){
    let lh='<div class="legend-title">Metal Stack</div>';
    for(let l=0;l<nLayers;l++){
      const hex=SEMI_LAYER_HEX[l%SEMI_LAYER_HEX.length];
      lh+='<div class="layer-legend-item"><span class="swatch" style="background:'+hex+';box-shadow:0 0 6px '+hex+'"></span>'+SEMI_LAYER_NAMES[l]+'</div>';
    }
    legend.innerHTML=lh;
  }

  // Stats
  const stats=document.getElementById('route-stats');
  if(stats)stats.textContent=wires.length+' wires · '+vias.length+' vias · '+nLayers+' layers · '+(ph.wirelength||0).toFixed(0)+' µm';

  // Toolbar — smooth animated transitions + congestion toggle
  const tb=document.getElementById('route-tb');
  if(tb){
    let tbh='<button class="active" id="rb-3d">3D Stack</button>';
    tbh+='<button id="rb-top">Top Down</button>';
    tbh+='<button id="rb-side">Side View</button>';
    if(wires.length>10)tbh+='<button id="rb-heat">Congestion</button>';
    tb.innerHTML=tbh;
    function routeViewBtn(id,th,ph_,r){
      document.getElementById(id).addEventListener('click',function(){
        document.querySelectorAll('#route-tb button:not(#rb-heat)').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        if(th===null)ctx.resetView(); else ctx.animateTo(th,ph_,r);
      });
    }
    routeViewBtn('rb-3d',null,0,0);
    routeViewBtn('rb-top',0,0.05,R*1.5);
    routeViewBtn('rb-side',Math.PI/2,Math.PI/2-0.08,R*1.5);
    if(document.getElementById('rb-heat')){
      document.getElementById('rb-heat').addEventListener('click',function(){
        heatGroup.visible=!heatGroup.visible;
        this.classList.toggle('active',heatGroup.visible);
      });
    }
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
buildSidebar();render();refreshState();
</script>
</body>
