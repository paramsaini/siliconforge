<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiliconForge Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg-deep: #06080f;
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f1424;
  --bg-card: rgba(15,22,42,0.65);
  --bg-card-solid: #111827;
  --bg-hover: rgba(56,189,248,0.06);
  --border: rgba(148,163,184,0.08);
  --border-accent: rgba(56,189,248,0.15);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent: #38bdf8;
  --accent-bright: #7dd3fc;
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.3);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.3);
  --orange: #fbbf24;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
  --gradient-1: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
  --gradient-2: linear-gradient(135deg, #34d399 0%, #38bdf8 100%);
  --gradient-3: linear-gradient(135deg, #f472b6 0%, #a78bfa 100%);
  --gradient-4: linear-gradient(135deg, #fbbf24 0%, #f87171 100%);
  --glass: rgba(15,22,42,0.6);
  --glass-border: rgba(148,163,184,0.1);
  --sidebar-w: 240px;
  --header-h: 52px;
  --radius: 12px;
  --radius-sm: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg-deep);color:var(--text-primary);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56,189,248,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(129,140,248,0.06) 0%, transparent 50%);
}
::selection{background:rgba(56,189,248,0.3);color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.15);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.3);}

/* ─── HEADER ─── */
.header{
  height:var(--header-h);
  background:rgba(10,14,26,0.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;
  z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:var(--gradient-1);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  box-shadow:0 0 20px rgba(56,189,248,0.3);
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.logo-text span{color:var(--text-muted);font-weight:400;margin-left:4px;}
.header-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.header-status{
  font-size:11px;color:var(--text-muted);
  display:flex;align-items:center;gap:6px;
}
.header-status .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green-glow);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{
  padding:6px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text-secondary);font-size:12px;font-weight:500;
  font-family:'Inter',sans-serif;
  cursor:pointer;transition:all 0.2s ease;
}
.btn:hover{border-color:var(--border-accent);color:var(--text-primary);background:var(--bg-hover);}
.btn-primary{
  background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(129,140,248,0.15));
  border-color:rgba(56,189,248,0.3);color:var(--accent-bright);
}
.btn-primary:hover{
  background:linear-gradient(135deg,rgba(56,189,248,0.25),rgba(129,140,248,0.25));
  box-shadow:0 0 20px rgba(56,189,248,0.15);
}
.btn-run{
  background:linear-gradient(135deg,rgba(52,211,153,0.15),rgba(56,189,248,0.15));
  border-color:rgba(52,211,153,0.3);color:var(--green);
}
.btn-run:hover{
  background:linear-gradient(135deg,rgba(52,211,153,0.25),rgba(56,189,248,0.25));
  box-shadow:0 0 20px rgba(52,211,153,0.15);
}

/* ─── LAYOUT ─── */
.main{display:flex;flex:1;overflow:hidden;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);
  background:rgba(10,14,26,0.5);
  backdrop-filter:blur(10px);
  border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;
  padding:8px 0;
}
.sb-group{margin-bottom:4px;}
.sb-group-hdr{
  padding:8px 16px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:color 0.2s;user-select:none;
}
.sb-group-hdr:hover{color:var(--text-secondary);}
.sb-group-hdr svg{width:10px;height:10px;transition:transform 0.2s;fill:currentColor;}
.sb-group.collapsed .sb-group-hdr svg{transform:rotate(-90deg);}
.sb-group.collapsed .sb-items{display:none;}
.sb-item{
  padding:6px 16px 6px 20px;font-size:13px;font-weight:400;
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:all 0.15s ease;border-left:2px solid transparent;
  margin:1px 0;
}
.sb-item:hover{color:var(--text-secondary);background:var(--bg-hover);border-left-color:rgba(56,189,248,0.2);}
.sb-item.active{
  color:var(--accent);background:rgba(56,189,248,0.06);
  border-left-color:var(--accent);font-weight:500;
}
.sb-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--text-muted);opacity:0.4;
  transition:all 0.3s ease;
}
.sb-dot.done{
  background:var(--green);opacity:1;
  box-shadow:0 0 6px var(--green-glow);
}

/* ─── CONTENT ─── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.stage-view{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth;}
.stage-hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.stage-num{
  font-size:11px;font-weight:600;color:var(--accent);
  background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);
  padding:2px 8px;border-radius:20px;
}
.stage-hdr h2{font-size:20px;font-weight:700;letter-spacing:-0.3px;}

/* ─── CARDS ─── */
.card{
  background:var(--bg-card);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:20px;margin-bottom:16px;
  transition:border-color 0.3s;
}
.card:hover{border-color:var(--border-accent);}
.card-title{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.8px;color:var(--text-muted);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.card-title::before{
  content:'';width:3px;height:12px;border-radius:2px;
  background:var(--gradient-1);
}

/* ─── METRICS ─── */
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.m-card{
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.m-card:hover{border-color:var(--border-accent);transform:translateY(-1px);}
.m-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gradient-1);opacity:0;transition:opacity 0.3s;
}
.m-card:hover::after{opacity:1;}
.m-label{font-size:10px;color:var(--text-muted);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.m-val{font-size:20px;font-weight:700;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.m-val.good{color:var(--green);}
.m-val.warn{color:var(--orange);}
.m-val.bad{color:var(--red);}

/* ─── FLOW CHIPS ─── */
.flow-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.f-chip{
  font-size:10px;font-weight:500;padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);color:var(--text-muted);
  transition:all 0.3s;
}
.f-chip.done{
  border-color:rgba(52,211,153,0.3);color:var(--green);
  background:rgba(52,211,153,0.08);
}

/* ─── GAUGE ─── */
.gauge-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.gauge-wrap{text-align:center;}
.gauge-label{font-size:10px;color:var(--text-muted);margin-top:8px;text-transform:uppercase;letter-spacing:0.5px;}
.gauge-value{font-size:13px;font-weight:700;margin-top:2px;}

/* ─── TABLES ─── */
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{
  text-align:left;padding:8px 12px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);
  border-bottom:1px solid var(--border);
}
.dt td{padding:7px 12px;border-bottom:1px solid rgba(148,163,184,0.04);}
.dt tr:hover td{background:var(--bg-hover);}

/* ─── CANVAS ─── */
.viz{
  width:100%;border-radius:var(--radius-sm);overflow:hidden;
  border:1px solid var(--border);background:var(--bg-deep);
  position:relative;
}
.viz canvas{display:block;width:100%;}
.scene-3d{width:100%;height:500px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);position:relative;cursor:grab;background:#06080f;}
.scene-3d:active{cursor:grabbing;}
.scene-3d canvas{display:block;}
.layer-legend{position:absolute;top:10px;right:10px;background:rgba(6,8,15,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;z-index:10;}
.layer-legend-item{display:flex;align-items:center;gap:7px;margin:4px 0;color:var(--text-secondary);}
.layer-legend-item .swatch{width:14px;height:6px;border-radius:2px;}
.scene-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-muted);pointer-events:none;opacity:0.5;background:rgba(6,8,15,0.6);padding:2px 10px;border-radius:10px;}

/* ─── TERMINAL ─── */
.terminal{
  height:170px;background:rgba(6,8,15,0.95);
  border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;
}
.term-bar{
  display:flex;align-items:center;padding:6px 14px;gap:8px;
  background:rgba(15,20,36,0.8);border-bottom:1px solid var(--border);
}
.term-dots{display:flex;gap:5px;}
.term-dots span{width:8px;height:8px;border-radius:50%;opacity:0.6;}
.term-bar-label{font-size:11px;color:var(--text-muted);font-weight:500;}
.term-out{
  flex:1;overflow-y:auto;padding:8px 14px;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:11.5px;line-height:1.6;color:var(--text-muted);white-space:pre-wrap;
}
.term-in-row{
  display:flex;align-items:center;padding:4px 14px;gap:8px;
  border-top:1px solid var(--border);background:rgba(15,20,36,0.5);
}
.term-prompt{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;}
.term-input{
  flex:1;background:transparent;border:none;
  color:var(--text-primary);font-family:'JetBrains Mono',monospace;
  font-size:12px;outline:none;
}

/* ─── STATUS BAR ─── */
.pass-badge{color:var(--green);font-weight:600;font-size:13px;}
.fail-badge{color:var(--red);font-weight:600;font-size:13px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">SF</div>
    <div class="logo-text">SiliconForge<span>Studio</span></div>
  </div>
  <div class="header-sep"></div>
  <div class="header-status"><div class="pulse"></div><span id="hdr-status">Ready</span></div>
  <div class="header-actions">
    <input type="file" id="verilog-upload" accept=".v,.sv" style="display:none" onchange="uploadFile(this)">
    <button class="btn" onclick="document.getElementById('verilog-upload').click()">Upload Verilog</button>
    <button class="btn btn-primary" onclick="runFullFlow()">▶ Run Full Flow</button>
    <button class="btn" onclick="refreshState()">↻ Refresh</button>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="stage-view" id="stage-view"></div>
    <div class="terminal">
      <div class="term-bar">
        <div class="term-dots"><span style="background:#f87171"></span><span style="background:#fbbf24"></span><span style="background:#34d399"></span></div>
        <span class="term-bar-label">Terminal</span>
        <button class="btn" style="margin-left:auto;padding:2px 8px;font-size:10px" onclick="clearTerm()">Clear</button>
      </div>
      <div class="term-out" id="term-out"></div>
      <div class="term-in-row">
        <span class="term-prompt">sf ❯</span>
        <input class="term-input" id="term-input" placeholder="Enter command..." onkeydown="if(event.key==='Enter')sendCmd()">
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   STATE & CONFIG
   ═══════════════════════════════════════════════════════ */
let S = {};
let curStage = 'dashboard';
let designFile = 'test_design.v';
const DPR = window.devicePixelRatio || 1;
let _3dScenes = [];
function cleanup3D(){for(const s of _3dScenes){if(s.animId)cancelAnimationFrame(s.animId);if(s.renderer){s.renderer.dispose();s.renderer.forceContextLoss();}}_3dScenes=[];}

const GROUPS = [
  {name:'Overview', items:[{id:'dashboard',label:'Dashboard'}]},
  {name:'RTL & Frontend', items:[
    {id:'rtl',label:'RTL Design',cmd:'read_verilog '},
    {id:'simulation',label:'Simulation',cmd:'simulate'},
    {id:'formal',label:'Formal Verify',cmd:'formal_bmc 10'},
    {id:'synthesis',label:'Synthesis',cmd:'synthesize'},
    {id:'dft',label:'DFT / ATPG',cmd:'run_dft'},
    {id:'lec',label:'LEC',cmd:'lec'},
  ]},
  {name:'Physical Design', items:[
    {id:'placement',label:'Placement',cmd:'floorplan 200 200 10'},
    {id:'cts',label:'Clock Tree',cmd:'cts'},
    {id:'routing',label:'Routing',cmd:'route'},
    {id:'post_route',label:'Post-Route Opt',cmd:'post_route_opt'},
    {id:'chip',label:'Chip Assembly',cmd:'chip_assemble'},
  ]},
  {name:'Signoff', items:[
    {id:'sta',label:'Timing (STA)',cmd:'sta'},
    {id:'power',label:'Power',cmd:'power'},
    {id:'drc',label:'DRC',cmd:'drc'},
    {id:'lvs',label:'LVS',cmd:'lvs'},
  ]},
  {name:'Advanced', items:[
    {id:'mcmm',label:'MCMM',cmd:'mcmm'},
    {id:'ssta',label:'SSTA & Yield',cmd:'ssta'},
    {id:'ir_drop',label:'IR Drop',cmd:'ir_drop'},
    {id:'pdn',label:'PDN Impedance',cmd:'pdn'},
    {id:'si',label:'Signal Integrity',cmd:'si'},
    {id:'thermal',label:'Thermal',cmd:'thermal'},
    {id:'em',label:'Electromigration',cmd:'em'},
    {id:'noise',label:'Noise / SSN',cmd:'noise'},
    {id:'ml',label:'ML Optimization',cmd:'ai_tune'},
    {id:'adv_formal',label:'Adv. Formal',cmd:'adv_formal'},
  ]},
  {name:'Output', items:[{id:'gdsii',label:'GDSII Export',cmd:'write_gds out.gds'}]},
];

const FLAG = {
  rtl:'has_netlist',simulation:'is_simulated',formal:'is_formal_done',
  synthesis:'is_synthesized',dft:'is_dft_done',lec:'is_lec_done',
  placement:'is_placed',cts:'is_cts_done',routing:'is_routed',
  post_route:'is_post_route_done',chip:'is_chip_assembled',
  sta:'is_sta_done',power:'is_power_done',drc:'is_drc_done',lvs:'is_lvs_done',
  mcmm:'is_mcmm_done',ssta:'is_ssta_done',ir_drop:'is_ir_drop_done',
  pdn:'is_pdn_done',si:'is_si_done',thermal:'is_thermal_done',
  em:'is_em_done',noise:'is_noise_done',ml:'is_ml_done',adv_formal:'is_adv_formal_done',
};

/* ═══════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════ */
function buildSidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  for(const g of GROUPS){
    const gd=document.createElement('div');gd.className='sb-group';
    const hdr=document.createElement('div');hdr.className='sb-group-hdr';
    hdr.innerHTML='<svg viewBox="0 0 10 10"><path d="M2 3l3 4 3-4z"/></svg>'+g.name;
    hdr.onclick=()=>gd.classList.toggle('collapsed');
    gd.appendChild(hdr);
    const items=document.createElement('div');items.className='sb-items';
    for(const s of g.items){
      const it=document.createElement('div');
      it.className='sb-item'+(s.id===curStage?' active':'');
      it.dataset.id=s.id;
      const fs=S.flow_state||{};
      const done=FLAG[s.id]&&fs[FLAG[s.id]];
      it.innerHTML='<span class="sb-dot'+(done?' done':'')+'"></span>'+s.label;
      it.onclick=()=>selectStage(s.id);
      items.appendChild(it);
    }
    gd.appendChild(items);sb.appendChild(gd);
  }
}

function selectStage(id){
  curStage=id;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  render();
}

/* ═══════════════════════════════════════════════════════
   API
   ═══════════════════════════════════════════════════════ */
async function apiCmd(cmd){
  tOut('> '+cmd);setStatus('Running...');
  try{
    const r=await fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
    const d=await r.json();
    if(d.output)tOut(d.output);
    if(d.state){S=d.state;buildSidebar();render();}
    setStatus('Ready');return d;
  }catch(e){tOut('[ERROR] '+e.message);setStatus('Error');}
}
async function refreshState(){
  try{const r=await fetch('/api/state');S=await r.json();buildSidebar();render();tOut('[State refreshed]');}
  catch(e){tOut('[ERROR] '+e.message);}
}
async function uploadFile(inp){
  const f=inp.files[0];if(!f)return;designFile=f.name;
  const fd=new FormData();fd.append('file',f);
  try{await fetch('/api/upload',{method:'POST',body:fd});tOut('[Uploaded] '+f.name);await apiCmd('read_verilog studio/'+f.name);}
  catch(e){tOut('[ERROR] '+e.message);}
}
async function runFullFlow(){tOut('[Running full RTL-to-GDSII flow...]');await apiCmd('run_all 200 200');}

function tOut(t){const el=document.getElementById('term-out');el.textContent+=t+'\n';el.scrollTop=el.scrollHeight;}
function clearTerm(){document.getElementById('term-out').textContent='';}
function sendCmd(){const inp=document.getElementById('term-input');const c=inp.value.trim();if(!c)return;inp.value='';apiCmd(c);}
function setStatus(t){document.getElementById('hdr-status').textContent=t;}

/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */
function mc(label,value,cls){
  return '<div class="m-card"><div class="m-label">'+label+'</div><div class="m-val '+(cls||'')+'">'+value+'</div></div>';
}
function sHdr(num,title,cmd){
  let h='<div class="stage-hdr"><span class="stage-num">#'+num+'</span><h2>'+title+'</h2>';
  if(cmd)h+='<button class="btn btn-run" style="margin-left:auto" onclick="apiCmd(\''+cmd.replace(/'/g,"\\'")+'\')">▶ Run</button>';
  return h+'</div>';
}
function mkCanvas(id,w,h){
  return '<div class="viz"><canvas id="'+id+'" width="'+w+'" height="'+h+'"></canvas></div>';
}
function hiDpiCanvas(canvas,w,h){
  canvas.width=w*DPR;canvas.height=h*DPR;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);return ctx;
}

/* ═══════════════════════════════════════════════════════
   RENDER DISPATCH
   ═══════════════════════════════════════════════════════ */
function render(){
  cleanup3D();
  const el=document.getElementById('stage-view');
  const fn=R[curStage];
  if(fn){el.innerHTML='';fn(el);}
  else el.innerHTML='<div class="card"><p style="color:var(--text-secondary)">Select a stage from the sidebar.</p></div>';
}

/* ═══════════════════════════════════════════════════════
   RENDERERS
   ═══════════════════════════════════════════════════════ */
const R={};

// ── DASHBOARD ──
R.dashboard=function(el){
  const fs=S.flow_state||{},nl=S.netlist||{},t=S.timing||{},p=S.power||{},ph=S.physical||{},drc=S.drc||{};
  const all=Object.entries(FLAG);const done=all.filter(e=>fs[e[1]]).length;
  let h='<div class="stage-hdr"><h2>Design Dashboard</h2></div>';

  // Progress gauges
  h+='<div class="card"><div class="card-title">Flow Progress</div>';
  h+='<div class="gauge-row">';
  h+='<div class="gauge-wrap">'+mkCanvas('g-progress',100,100)+'<div class="gauge-label">Stages</div><div class="gauge-value">'+done+'/'+all.length+'</div></div>';
  const yield_v=((S.ssta||{}).yield_estimate||0)*100;
  h+='<div class="gauge-wrap">'+mkCanvas('g-yield',100,100)+'<div class="gauge-label">Yield</div><div class="gauge-value">'+yield_v.toFixed(1)+'%</div></div>';
  const drc_v=drc.violations||0;
  h+='<div class="gauge-wrap">'+mkCanvas('g-drc',100,100)+'<div class="gauge-label">DRC Clean</div><div class="gauge-value">'+(drc_v===0?'✓':''+drc_v)+'</div></div>';
  h+='</div>';
  h+='<div class="flow-chips">';
  const allItems=[];GROUPS.forEach(g=>g.items.forEach(s=>allItems.push(s)));
  for(const[id,flag] of all){const info=allItems.find(s=>s.id===id);h+='<span class="f-chip'+(fs[flag]?' done':'')+'">'+((info?info.label:id))+'</span>';}
  h+='</div></div>';

  // Key metrics
  h+='<div class="card"><div class="card-title">Key Metrics</div><div class="metrics">';
  h+=mc('Gates',nl.num_gates||0)+mc('Nets',nl.num_nets||0)+mc('FFs',nl.num_ffs||0);
  h+=mc('WNS',(t.wns||0).toFixed(3)+' ns',(t.wns||0)>=0?'good':'bad');
  h+=mc('TNS',(t.tns||0).toFixed(3)+' ns',(t.tns||0)>=0?'good':'warn');
  h+=mc('Power',(p.total_mw||0).toFixed(2)+' mW');
  h+=mc('Cells',ph.num_cells||0)+mc('Wires',ph.num_wires||0);
  h+=mc('DRC',drc_v,drc_v===0?'good':'bad');
  h+='</div></div>';

  // 3D chip overview
  if(ph.cells&&ph.cells.length){
    h+='<div class="card"><div class="card-title">Chip Overview — 3D Interactive</div>';
    h+='<div class="scene-3d" id="dash-3d" style="height:400px">';
    h+='<div class="scene-hint">Drag to rotate • Scroll to zoom</div>';
    h+='</div></div>';
  }
  el.innerHTML=h;

  // Draw gauges
  setTimeout(()=>{
    drawGauge('g-progress',done/all.length,['#38bdf8','#818cf8']);
    drawGauge('g-yield',yield_v/100,['#34d399','#38bdf8']);
    drawGauge('g-drc',drc_v===0?1:Math.max(0,1-drc_v/50),drc_v===0?['#34d399','#38bdf8']:['#f87171','#fbbf24']);
    if(ph.cells&&ph.cells.length)build3DPlacement(document.getElementById('dash-3d'),ph);
  },30);
};

// ── Radial Gauge ──
function drawGauge(canvasId,pct,colors,radius){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const W=canvas.parentElement.clientWidth||100,H=canvas.parentElement.clientHeight||100;
  const ctx=hiDpiCanvas(canvas,W,H);
  const cx=W/2,cy=H/2,r=radius||Math.min(W,H)/2-8,lw=6;
  pct=Math.max(0,Math.min(1,pct));
  // Track
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI*0.75,Math.PI*0.75);
  ctx.strokeStyle='rgba(148,163,184,0.08)';ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
  // Value arc
  const startA=-Math.PI*0.75,endA=startA+(Math.PI*1.5)*pct;
  const grad=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
  grad.addColorStop(0,colors[0]);grad.addColorStop(1,colors[1]);
  ctx.beginPath();ctx.arc(cx,cy,r,startA,endA);
  ctx.strokeStyle=grad;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
  // Glow
  ctx.beginPath();ctx.arc(cx,cy,r,startA,endA);
  ctx.strokeStyle=colors[0]+'33';ctx.lineWidth=lw+6;ctx.lineCap='round';ctx.stroke();
}

// ── RTL Node Graph ──
function drawRtlGraph(canvas,nl){
  const W=700,H=380,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg-deep');ctx.fillRect(0,0,W,H);
  const gates=nl.gates||[];if(!gates.length)return;
  const N=Math.min(gates.length,80);
  const cols=Math.ceil(Math.sqrt(N*1.8)),rows=Math.ceil(N/cols);
  const cw=W/(cols+1),ch=H/(rows+1);
  const palette={AND:'#38bdf8',OR:'#34d399',NOT:'#f87171',XOR:'#a78bfa',NAND:'#fbbf24',NOR:'#22d3ee',DFF:'#f472b6',BUF:'#94a3b8',INPUT:'#34d399',OUTPUT:'#f87171',MUX:'#fbbf24'};
  // Connections
  ctx.strokeStyle='rgba(56,189,248,0.08)';ctx.lineWidth=1;
  for(let i=1;i<N;i++){
    const c0=((i-1)%cols),r0=Math.floor((i-1)/cols);
    const c1=(i%cols),r1=Math.floor(i/cols);
    ctx.beginPath();
    ctx.moveTo((c0+0.5)*cw+20,(r0+0.5)*ch+20);
    ctx.lineTo((c1+0.5)*cw+20,(r1+0.5)*ch+20);
    ctx.stroke();
  }
  // Nodes
  for(let i=0;i<N;i++){
    const g=gates[i],col=i%cols,row=Math.floor(i/cols);
    const x=(col+0.5)*cw+20,y=(row+0.5)*ch+20;
    const color=palette[g.type]||'#38bdf8';
    // Shadow
    ctx.shadowColor=color+'44';ctx.shadowBlur=12;
    // Node
    const grad=ctx.createRadialGradient(x,y,0,x,y,20);
    grad.addColorStop(0,color+'44');grad.addColorStop(1,color+'08');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,16,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=color+'88';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowBlur=0;
    // Label
    ctx.fillStyle=color;ctx.font='500 8px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(g.type,x,y);
  }
}

// ── Waveform ──
function drawWaveform(canvas,sim){
  const sigs=sim.signals||[],times=sim.times||[];
  if(!sigs.length||!times.length)return;
  const W=700,H=Math.max(200,sigs.length*28+40),ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const nw=90,pw=W-nw-20,sh=20;
  const tMin=times[0],tMax=times[times.length-1]||1,tS=pw/((tMax-tMin)||1);
  for(let si=0;si<sigs.length;si++){
    const sig=sigs[si],by=20+si*(sh+8);
    ctx.fillStyle='#475569';ctx.font='500 10px JetBrains Mono';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(sig.name.slice(0,12),nw-10,by+sh/2);
    // Gradient fill under waveform
    const grad=ctx.createLinearGradient(0,by,0,by+sh);
    grad.addColorStop(0,'rgba(56,189,248,0.15)');grad.addColorStop(1,'rgba(56,189,248,0)');
    ctx.beginPath();
    for(let t=0;t<sig.values.length&&t<times.length;t++){
      const x=nw+(times[t]-tMin)*tS,y=sig.values[t]?by+2:by+sh-2;
      if(t===0){ctx.moveTo(x,by+sh);}
      ctx.lineTo(x,y);
    }
    ctx.lineTo(nw+(times[Math.min(sig.values.length,times.length)-1]-tMin)*tS,by+sh);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.5;ctx.beginPath();
    for(let t=0;t<sig.values.length&&t<times.length;t++){
      const x=nw+(times[t]-tMin)*tS,y=sig.values[t]?by+2:by+sh-2;
      if(t===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

// ── Isometric Chip / Placement 3D ──
function drawIsoChip(canvas,ph){
  const W=700,H=500,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const dw=(ph.die||{}).w||200,dh=(ph.die||{}).h||200;
  const sc=Math.min(300/dw,250/dh);
  const cos30=Math.cos(Math.PI/6),sin30=Math.sin(Math.PI/6);
  const ox=W/2,oy=H*0.65;
  function iso(x,y,z){return[ox+(x-y)*cos30, oy+(x+y)*sin30-z];}
  // Die platform
  const dp=[iso(0,0,0),iso(dw*sc,0,0),iso(dw*sc,dh*sc,0),iso(0,dh*sc,0)];
  // Side faces for 3D depth
  const depth=8;
  const dpB=[iso(0,0,-depth),iso(dw*sc,0,-depth),iso(dw*sc,dh*sc,-depth),iso(0,dh*sc,-depth)];
  // Right face
  ctx.fillStyle='rgba(56,189,248,0.04)';
  ctx.beginPath();ctx.moveTo(...dp[1]);ctx.lineTo(...dp[2]);ctx.lineTo(...dpB[2]);ctx.lineTo(...dpB[1]);ctx.closePath();ctx.fill();
  // Front face
  ctx.fillStyle='rgba(56,189,248,0.03)';
  ctx.beginPath();ctx.moveTo(...dp[2]);ctx.lineTo(...dp[3]);ctx.lineTo(...dpB[3]);ctx.lineTo(...dpB[2]);ctx.closePath();ctx.fill();
  // Top face
  const topGrad=ctx.createLinearGradient(dp[0][0],dp[0][1],dp[2][0],dp[2][1]);
  topGrad.addColorStop(0,'rgba(15,20,36,0.9)');topGrad.addColorStop(1,'rgba(15,20,36,0.7)');
  ctx.fillStyle=topGrad;
  ctx.beginPath();ctx.moveTo(...dp[0]);ctx.lineTo(...dp[1]);ctx.lineTo(...dp[2]);ctx.lineTo(...dp[3]);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(56,189,248,0.2)';ctx.lineWidth=1;ctx.stroke();
  // Grid lines
  ctx.strokeStyle='rgba(56,189,248,0.05)';ctx.lineWidth=0.5;
  for(let i=1;i<10;i++){
    const f=i/10;
    const a=iso(f*dw*sc,0,0),b=iso(f*dw*sc,dh*sc,0);
    ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.stroke();
    const c=iso(0,f*dh*sc,0),d=iso(dw*sc,f*dh*sc,0);
    ctx.beginPath();ctx.moveTo(...c);ctx.lineTo(...d);ctx.stroke();
  }
  // Cells as 3D blocks
  const cells=ph.cells||[];
  const layerColors=['#38bdf8','#34d399','#a78bfa','#f472b6','#fbbf24','#22d3ee'];
  for(const c of cells){
    const cx=c.x*sc,cy=c.y*sc,cw=(c.w||2)*sc,ch=(c.h||10)*sc,cz=6;
    const color=layerColors[(c.layer||0)%layerColors.length];
    // Top
    const t0=iso(cx,cy,cz),t1=iso(cx+cw,cy,cz),t2=iso(cx+cw,cy+ch,cz),t3=iso(cx,cy+ch,cz);
    ctx.fillStyle=color+'55';
    ctx.beginPath();ctx.moveTo(...t0);ctx.lineTo(...t1);ctx.lineTo(...t2);ctx.lineTo(...t3);ctx.closePath();ctx.fill();
    ctx.strokeStyle=color+'88';ctx.lineWidth=0.5;ctx.stroke();
    // Right face
    const b1=iso(cx+cw,cy,0),b2=iso(cx+cw,cy+ch,0);
    ctx.fillStyle=color+'33';
    ctx.beginPath();ctx.moveTo(...t1);ctx.lineTo(...t2);ctx.lineTo(...b2);ctx.lineTo(...b1);ctx.closePath();ctx.fill();
    // Front face
    const b3=iso(cx,cy+ch,0);
    ctx.fillStyle=color+'22';
    ctx.beginPath();ctx.moveTo(...t2);ctx.lineTo(...t3);ctx.lineTo(...b3);ctx.lineTo(...b2);ctx.closePath();ctx.fill();
  }
  // Wires
  for(const w of (ph.wires||[]).slice(0,300)){
    const lc=layerColors[(w.layer||0)%layerColors.length];
    const z=4+(w.layer||0)*3;
    const a=iso(w.x1*sc,w.y1*sc,z),b=iso(w.x2*sc,w.y2*sc,z);
    ctx.strokeStyle=lc+'44';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.stroke();
  }
}

// ── Isometric Routing 3D ──
function drawIsoRouting(canvas,ph){
  const W=700,H=500,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const dw=(ph.die||{}).w||200,dh=(ph.die||{}).h||200;
  const sc=Math.min(280/dw,230/dh);
  const cos30=Math.cos(Math.PI/6),sin30=Math.sin(Math.PI/6);
  const ox=W/2,oy=H*0.7;
  function iso(x,y,z){return[ox+(x-y)*cos30,oy+(x+y)*sin30-z];}
  const nLayers=ph.num_layers||3;
  const layerColors=['#38bdf8','#34d399','#a78bfa','#f472b6','#fbbf24','#22d3ee','#f87171','#94a3b8'];
  const layerH=30;
  // Draw layer planes (bottom to top)
  for(let l=0;l<nLayers;l++){
    const z=l*layerH;
    const p=[iso(0,0,z),iso(dw*sc,0,z),iso(dw*sc,dh*sc,z),iso(0,dh*sc,z)];
    const lc=layerColors[l%layerColors.length];
    ctx.fillStyle=lc+'0a';ctx.strokeStyle=lc+'22';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(...p[0]);ctx.lineTo(...p[1]);ctx.lineTo(...p[2]);ctx.lineTo(...p[3]);ctx.closePath();ctx.fill();ctx.stroke();
    // Label
    ctx.fillStyle=lc+'88';ctx.font='600 10px Inter';ctx.textAlign='right';
    const lbl=iso(-10,dh*sc/2,z);ctx.fillText('M'+(l+1),lbl[0],lbl[1]);
  }
  // Wires
  for(const w of (ph.wires||[]).slice(0,500)){
    const l=w.layer||0;const z=l*layerH;
    const lc=layerColors[l%layerColors.length];
    const a=iso(w.x1*sc,w.y1*sc,z),b=iso(w.x2*sc,w.y2*sc,z);
    ctx.strokeStyle=lc+'66';ctx.lineWidth=1.2;
    ctx.shadowColor=lc+'33';ctx.shadowBlur=4;
    ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.stroke();
    ctx.shadowBlur=0;
  }
  // Vias
  for(const v of (ph.vias||[]).slice(0,200)){
    const z0=Math.min(v.lower_layer,v.upper_layer)*layerH;
    const z1=Math.max(v.lower_layer,v.upper_layer)*layerH;
    const a=iso(v.x*sc,v.y*sc,z0),b=iso(v.x*sc,v.y*sc,z1);
    ctx.strokeStyle='#fbbf2444';ctx.lineWidth=1;ctx.setLineDash([2,2]);
    ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.stroke();ctx.setLineDash([]);
  }
}

// ── 3D Surface Heatmap ──
function draw3DSurface(canvas,map2d,title){
  const W=600,H=450,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  if(!map2d.length||!map2d[0].length)return;
  const ny=map2d.length,nx=map2d[0].length;
  let minV=Infinity,maxV=-Infinity;
  for(const row of map2d)for(const v of row){if(v<minV)minV=v;if(v>maxV)maxV=v;}
  const range=maxV-minV||1;
  const cos30=Math.cos(Math.PI/6),sin30=Math.sin(Math.PI/6);
  const cellW=280/nx,cellH=200/ny,zScale=80;
  const ox=W/2+20,oy=H*0.3;
  function iso(x,y,z){return[ox+(x-y)*cos30,oy+(x+y)*sin30-z];}
  function heatColor(t){
    if(t<0.25)return`rgb(${Math.floor(t*4*100)},${Math.floor(t*4*200+55)},255)`;
    if(t<0.5)return`rgb(${Math.floor((t-0.25)*4*155+100)},255,${Math.floor(255-(t-0.25)*4*255)})`;
    if(t<0.75)return`rgb(255,${Math.floor(255-(t-0.5)*4*255)},0)`;
    return`rgb(255,${Math.floor((t-0.75)*4*100)},${Math.floor((t-0.75)*4*100)})`;
  }
  // Draw from back to front for correct depth order
  for(let y=0;y<ny-1;y++){
    for(let x=0;x<nx-1;x++){
      const t00=(map2d[y][x]-minV)/range;
      const t10=(map2d[y][x+1]-minV)/range;
      const t01=(map2d[y+1][x]-minV)/range;
      const t11=(map2d[y+1][x+1]-minV)/range;
      const p0=iso(x*cellW,y*cellH,t00*zScale);
      const p1=iso((x+1)*cellW,y*cellH,t10*zScale);
      const p2=iso((x+1)*cellW,(y+1)*cellH,t11*zScale);
      const p3=iso(x*cellW,(y+1)*cellH,t01*zScale);
      const avg=(t00+t10+t01+t11)/4;
      ctx.fillStyle=heatColor(avg);
      ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.moveTo(...p0);ctx.lineTo(...p1);ctx.lineTo(...p2);ctx.lineTo(...p3);ctx.closePath();ctx.fill();
      ctx.globalAlpha=1;
      ctx.strokeStyle=heatColor(avg);ctx.globalAlpha=0.3;ctx.lineWidth=0.5;ctx.stroke();ctx.globalAlpha=1;
    }
  }
  // Title
  ctx.fillStyle='#94a3b8';ctx.font='600 11px Inter';ctx.textAlign='center';
  ctx.fillText(title||'',W/2,20);
  // Legend
  const lx=W-60,ly=40,lh=120;
  for(let i=0;i<lh;i++){
    ctx.fillStyle=heatColor(1-i/lh);ctx.fillRect(lx,ly+i,12,2);
  }
  ctx.fillStyle='#94a3b8';ctx.font='10px Inter';ctx.textAlign='left';
  ctx.fillText(maxV.toFixed(1),lx+16,ly+6);ctx.fillText(minV.toFixed(1),lx+16,ly+lh);
}

// ── Bar Comparison ──
function drawBarComp(canvas,items){
  const W=500,H=220,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const ml=60,mr=20,mt=30,mb=40,pw=W-ml-mr,ph=H-mt-mb;
  const n=items.length,gw=pw/n,bw=gw*0.25;
  const mx=Math.max(...items.map(i=>Math.max(Math.abs(i.b),Math.abs(i.a))))||1;
  for(let i=0;i<n;i++){
    const cx=ml+(i+0.5)*gw;
    const bh=(Math.abs(items[i].b)/mx)*ph,ah=(Math.abs(items[i].a)/mx)*ph;
    // Before bar
    const g1=ctx.createLinearGradient(0,H-mb-bh,0,H-mb);
    g1.addColorStop(0,'#f8717188');g1.addColorStop(1,'#f8717122');
    ctx.fillStyle=g1;ctx.beginPath();
    roundRect(ctx,cx-bw-4,H-mb-bh,bw,bh,4);ctx.fill();
    // After bar
    const g2=ctx.createLinearGradient(0,H-mb-ah,0,H-mb);
    g2.addColorStop(0,'#34d39988');g2.addColorStop(1,'#34d39922');
    ctx.fillStyle=g2;ctx.beginPath();
    roundRect(ctx,cx+4,H-mb-ah,bw,ah,4);ctx.fill();
    ctx.fillStyle='#94a3b8';ctx.font='500 11px Inter';ctx.textAlign='center';
    ctx.fillText(items[i].l,cx,H-mb+20);
  }
  // Legend
  ctx.fillStyle='#f8717188';ctx.fillRect(ml,10,10,10);
  ctx.fillStyle='#94a3b8';ctx.font='10px Inter';ctx.textAlign='left';ctx.fillText('Before',ml+14,19);
  ctx.fillStyle='#34d39988';ctx.fillRect(ml+70,10,10,10);ctx.fillStyle='#94a3b8';ctx.fillText('After',ml+84,19);
}
function roundRect(ctx,x,y,w,h,r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);}

// ── Donut Chart ──
function drawDonut(canvas,slices){
  const W=400,H=260,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const cx=160,cy=H/2,r=80,lw=24;
  const total=slices.reduce((s,d)=>s+d.v,0)||1;
  let startA=-Math.PI/2;
  for(const sl of slices){
    const sweep=(sl.v/total)*Math.PI*2;
    if(sweep<0.001)continue;
    const grad=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r);
    grad.addColorStop(0,sl.c[0]);grad.addColorStop(1,sl.c[1]);
    ctx.beginPath();ctx.arc(cx,cy,r,startA,startA+sweep);
    ctx.strokeStyle=grad;ctx.lineWidth=lw;ctx.lineCap='butt';ctx.stroke();
    // Glow
    ctx.beginPath();ctx.arc(cx,cy,r,startA,startA+sweep);
    ctx.strokeStyle=sl.c[0]+'22';ctx.lineWidth=lw+10;ctx.stroke();
    startA+=sweep;
  }
  // Center text
  ctx.fillStyle='#f1f5f9';ctx.font='700 18px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total.toFixed(1),cx,cy-6);
  ctx.fillStyle='#475569';ctx.font='500 10px Inter';ctx.fillText('mW',cx,cy+10);
  // Legend
  let ly=40;
  for(const sl of slices){
    const grad=ctx.createLinearGradient(280,ly,292,ly);
    grad.addColorStop(0,sl.c[0]);grad.addColorStop(1,sl.c[1]);
    ctx.fillStyle=grad;ctx.fillRect(280,ly,12,12);ctx.beginPath();
    ctx.fillStyle='#94a3b8';ctx.font='12px Inter';ctx.textAlign='left';
    ctx.fillText(sl.l+' — '+sl.v.toFixed(2),300,ly+10);
    ly+=24;
  }
}

// ── Yield Curve ──
function drawYieldCurve(canvas,sy){
  const W=600,H=280,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const entries=Object.entries(sy).map(e=>[parseFloat(e[0]),e[1]]).sort((a,b)=>a[0]-b[0]);
  if(!entries.length)return;
  const m={l:50,r:20,t:20,b:40},pw=W-m.l-m.r,ph=H-m.t-m.b;
  const xMin=entries[0][0],xMax=entries[entries.length-1][0],xR=xMax-xMin||1;
  // Grid
  ctx.strokeStyle='rgba(148,163,184,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=m.t+ph*(i/4);ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(W-m.r,y);ctx.stroke();}
  // Fill
  const grad=ctx.createLinearGradient(0,m.t,0,H-m.b);
  grad.addColorStop(0,'rgba(52,211,153,0.15)');grad.addColorStop(1,'rgba(52,211,153,0)');
  ctx.beginPath();ctx.moveTo(m.l,H-m.b);
  for(const e of entries)ctx.lineTo(m.l+((e[0]-xMin)/xR)*pw,m.t+(1-e[1]/100)*ph);
  ctx.lineTo(m.l+pw,H-m.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // Line
  const lineGrad=ctx.createLinearGradient(m.l,0,W-m.r,0);
  lineGrad.addColorStop(0,'#34d399');lineGrad.addColorStop(1,'#38bdf8');
  ctx.strokeStyle=lineGrad;ctx.lineWidth=2.5;ctx.beginPath();
  for(let i=0;i<entries.length;i++){const x=m.l+((entries[i][0]-xMin)/xR)*pw,y=m.t+(1-entries[i][1]/100)*ph;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
  // Points
  for(const e of entries){const x=m.l+((e[0]-xMin)/xR)*pw,y=m.t+(1-e[1]/100)*ph;
    ctx.fillStyle='#34d399';ctx.shadowColor='rgba(52,211,153,0.4)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  ctx.fillStyle='#475569';ctx.font='500 10px Inter';ctx.textAlign='center';ctx.fillText('Sigma (σ)',W/2,H-8);
};

// ── Impedance Plot ──
function drawImpedance(canvas,pdn){
  const W=600,H=280,ctx=hiDpiCanvas(canvas,W,H);
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,W,H);
  const pts=pdn.impedance_profile;if(!pts.length)return;
  const m={l:60,r:20,t:20,b:40},pw=W-m.l-m.r,ph=H-m.t-m.b;
  const maxZ=Math.max(...pts.map(p=>p.impedance_mohm),pdn.target_impedance_mohm||1);
  // Grid
  ctx.strokeStyle='rgba(148,163,184,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=m.t+ph*(i/4);ctx.beginPath();ctx.moveTo(m.l,y);ctx.lineTo(W-m.r,y);ctx.stroke();}
  // Target line
  if(pdn.target_impedance_mohm>0){
    const ty=m.t+(1-pdn.target_impedance_mohm/maxZ)*ph;
    ctx.strokeStyle='#f8717144';ctx.lineWidth=1;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(m.l,ty);ctx.lineTo(W-m.r,ty);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f87171';ctx.font='10px Inter';ctx.textAlign='right';ctx.fillText('Target',W-m.r-4,ty-6);
  }
  // Fill
  const grad=ctx.createLinearGradient(0,m.t,0,H-m.b);
  grad.addColorStop(0,'rgba(56,189,248,0.12)');grad.addColorStop(1,'rgba(56,189,248,0)');
  ctx.beginPath();ctx.moveTo(m.l,H-m.b);
  for(let i=0;i<pts.length;i++){const x=m.l+(i/(pts.length-1||1))*pw,y=m.t+(1-pts[i].impedance_mohm/maxZ)*ph;ctx.lineTo(x,y);}
  ctx.lineTo(m.l+pw,H-m.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.strokeStyle='#38bdf8';ctx.lineWidth=2;ctx.shadowColor='rgba(56,189,248,0.3)';ctx.shadowBlur=6;ctx.beginPath();
  for(let i=0;i<pts.length;i++){const x=m.l+(i/(pts.length-1||1))*pw,y=m.t+(1-pts[i].impedance_mohm/maxZ)*ph;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();ctx.shadowBlur=0;
}

/* ═══════════════════════════════════════════════════════
   THREE.JS 3D — PLACEMENT & ROUTING
   ═══════════════════════════════════════════════════════ */
const SEMI_LAYER_COLORS=[0x4169e1,0xc71585,0x228b22,0xdaa520,0xff6347,0x00ced1,0x9370db,0x20b2aa];
const SEMI_LAYER_NAMES=['M1','M2','M3','M4','M5','M6','M7','M8'];
const CELL_PALETTE=[0x38bdf8,0x34d399,0xa78bfa,0xf472b6,0xfbbf24,0x22d3ee,0x818cf8,0xf97316];

function create3DScene(container,opts){
  opts=opts||{};
  const w=container.clientWidth||700, h=container.clientHeight||500;
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x06080f);
  scene.fog=new THREE.FogExp2(0x06080f,opts.fog||0.0015);

  const camera=new THREE.PerspectiveCamera(40,w/h,0.1,10000);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(w,h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  container.insertBefore(renderer.domElement,container.firstChild);

  // Lights
  scene.add(new THREE.AmbientLight(0x404060,0.5));
  const dir=new THREE.DirectionalLight(0xffffff,0.7);
  dir.position.set(200,400,300);dir.castShadow=true;
  dir.shadow.mapSize.width=1024;dir.shadow.mapSize.height=1024;
  scene.add(dir);
  const fill=new THREE.DirectionalLight(0x38bdf8,0.15);
  fill.position.set(-200,100,-200);scene.add(fill);
  const point=new THREE.PointLight(0x818cf8,0.2,800);
  point.position.set(0,300,0);scene.add(point);

  // Orbit controls (manual)
  let drag=false,prev={x:0,y:0},btn=0;
  let theta=opts.theta||Math.PI/4, phi=opts.phi||Math.PI/3.5;
  let radius=opts.radius||300;
  const center=new THREE.Vector3(opts.cx||0,opts.cy||0,opts.cz||0);

  container.addEventListener('mousedown',e=>{drag=true;btn=e.button;prev={x:e.clientX,y:e.clientY};e.preventDefault();});
  container.addEventListener('contextmenu',e=>e.preventDefault());
  container.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
    if(btn===0){
      theta-=dx*0.005; phi=Math.max(0.05,Math.min(Math.PI/2-0.05,phi-dy*0.005));
    }else if(btn===2){
      const panX=-dx*0.3, panZ=dy*0.3;
      center.x+=panX*Math.cos(theta)+panZ*Math.sin(theta);
      center.z+=panX*Math.sin(theta)-panZ*Math.cos(theta);
    }
    prev={x:e.clientX,y:e.clientY};
  });
  container.addEventListener('mouseup',()=>drag=false);
  container.addEventListener('mouseleave',()=>drag=false);
  container.addEventListener('wheel',e=>{e.preventDefault();radius*=1+e.deltaY*0.0012;radius=Math.max(30,Math.min(3000,radius));},{passive:false});

  // Touch support
  let touchDist=0;
  container.addEventListener('touchstart',e=>{
    if(e.touches.length===1){drag=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    if(e.touches.length===2){touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:true});
  container.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){
      const dx=e.touches[0].clientX-prev.x, dy=e.touches[0].clientY-prev.y;
      theta-=dx*0.005;phi=Math.max(0.05,Math.min(Math.PI/2-0.05,phi-dy*0.005));
      prev={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      radius*=touchDist/Math.max(d,1);radius=Math.max(30,Math.min(3000,radius));touchDist=d;
    }
  },{passive:true});
  container.addEventListener('touchend',()=>drag=false);

  const ctx={scene,camera,renderer,animId:null};
  function animate(){
    ctx.animId=requestAnimationFrame(animate);
    camera.position.set(
      center.x+radius*Math.sin(phi)*Math.cos(theta),
      center.y+radius*Math.cos(phi),
      center.z+radius*Math.sin(phi)*Math.sin(theta)
    );
    camera.lookAt(center);
    renderer.render(scene,camera);
  }
  animate();
  _3dScenes.push(ctx);

  // Resize
  const ro=new ResizeObserver(()=>{
    const nw=container.clientWidth, nh=container.clientHeight;
    if(nw>0&&nh>0){camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);}
  });
  ro.observe(container);

  return ctx;
}

function build3DPlacement(container,ph){
  if(!container||typeof THREE==='undefined')return;
  const dw=(ph.die||{}).w||200, dh=(ph.die||{}).h||200;
  const sc=200/Math.max(dw,dh);
  const ox=-dw*sc/2, oz=-dh*sc/2;
  const R=Math.max(dw,dh)*sc;

  const ctx=create3DScene(container,{radius:R*1.4,phi:Math.PI/3.5,theta:Math.PI/4,fog:0.0008,cy:10});
  const scene=ctx.scene;

  // Die substrate slab
  const dieGeo=new THREE.BoxGeometry(dw*sc,3,dh*sc);
  const dieMat=new THREE.MeshPhongMaterial({color:0x0c1020,specular:0x222244,shininess:40});
  const die=new THREE.Mesh(dieGeo,dieMat);
  die.position.set(0,-1.5,0);die.receiveShadow=true;
  scene.add(die);

  // Substrate grid
  const gridGeo=new THREE.PlaneGeometry(dw*sc,dh*sc);
  const gridMat=new THREE.MeshBasicMaterial({color:0x1a2040,wireframe:true,transparent:true,opacity:0.15});
  const grid=new THREE.Mesh(gridGeo,gridMat);
  grid.rotation.x=-Math.PI/2;grid.position.y=0.05;
  scene.add(grid);

  // Fine grid lines
  const gridHelper=new THREE.GridHelper(Math.max(dw,dh)*sc,Math.min(40,Math.max(10,Math.round(dw/5))),0x1e3a5f,0x0f1a3a);
  gridHelper.position.y=0.1;
  scene.add(gridHelper);

  // Die edge glow
  const edgeGeo=new THREE.EdgesGeometry(dieGeo);
  const edgeMat=new THREE.LineBasicMaterial({color:0x38bdf8,transparent:true,opacity:0.3});
  scene.add(new THREE.LineSegments(edgeGeo,edgeMat));

  // Cells as 3D blocks with subtle height variation
  const cells=ph.cells||[];
  const instGeos={};
  for(const c of cells){
    const cw=Math.max((c.w||2)*sc,0.5);
    const cd=Math.max((c.h||10)*sc,0.5);
    const ch=2+Math.random()*3;
    const ci=(c.layer||Math.floor(Math.random()*6))%CELL_PALETTE.length;
    const color=CELL_PALETTE[ci];

    const geo=new THREE.BoxGeometry(cw,ch,cd);
    const mat=new THREE.MeshPhongMaterial({
      color:color,transparent:true,opacity:0.72,
      emissive:color,emissiveIntensity:0.12,
      specular:0xffffff,shininess:60,
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(ox+c.x*sc+cw/2,ch/2,oz+c.y*sc+cd/2);
    mesh.castShadow=true;
    scene.add(mesh);

    // Cell top glow line
    const topEdge=new THREE.EdgesGeometry(geo);
    const topMat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.25});
    const topLine=new THREE.LineSegments(topEdge,topMat);
    topLine.position.copy(mesh.position);
    scene.add(topLine);
  }

  // Wires on top of cells (limited for perf)
  const wires=(ph.wires||[]).slice(0,800);
  for(const w of wires){
    const l=w.layer||0;
    const lc=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
    const y=6+(l)*4;
    const x1=ox+w.x1*sc, z1=oz+w.y1*sc, x2=ox+w.x2*sc, z2=oz+w.y2*sc;
    const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
    if(len<0.01)continue;

    const wGeo=new THREE.BoxGeometry(len,0.5,0.4);
    const wMat=new THREE.MeshPhongMaterial({
      color:lc,transparent:true,opacity:0.45,
      emissive:lc,emissiveIntensity:0.15,
    });
    const wMesh=new THREE.Mesh(wGeo,wMat);
    wMesh.position.set((x1+x2)/2,y,(z1+z2)/2);
    wMesh.rotation.y=Math.atan2(z2-z1,x2-x1);
    scene.add(wMesh);
  }
}

function build3DRouting(container,ph){
  if(!container||typeof THREE==='undefined')return;
  const dw=(ph.die||{}).w||200, dh=(ph.die||{}).h||200;
  const nLayers=Math.max(ph.num_layers||3,1);
  const sc=200/Math.max(dw,dh);
  const ox=-dw*sc/2, oz=-dh*sc/2;
  const layerSpacing=18;
  const R=Math.max(dw,dh)*sc;

  const ctx=create3DScene(container,{
    radius:R*2,phi:Math.PI/3,theta:Math.PI/5,fog:0.0006,
    cy:nLayers*layerSpacing/2
  });
  const scene=ctx.scene;

  // Build legend
  const legend=document.getElementById('route-legend');
  if(legend){
    let lh='';
    for(let l=0;l<nLayers;l++){
      const c=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
      const hex='#'+c.toString(16).padStart(6,'0');
      lh+='<div class="layer-legend-item"><span class="swatch" style="background:'+hex+'"></span>'+SEMI_LAYER_NAMES[l]+'</div>';
    }
    lh+='<div class="layer-legend-item"><span class="swatch" style="background:#fff"></span>Via</div>';
    legend.innerHTML=lh;
  }

  // Substrate
  const subGeo=new THREE.BoxGeometry(dw*sc,2,dh*sc);
  const subMat=new THREE.MeshPhongMaterial({color:0x0a0e1a,specular:0x111133,shininess:30});
  const sub=new THREE.Mesh(subGeo,subMat);
  sub.position.set(0,-2,0);sub.receiveShadow=true;
  scene.add(sub);

  // Layer planes
  for(let l=0;l<nLayers;l++){
    const y=l*layerSpacing;
    const color=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];

    // Semi-transparent layer sheet
    const pGeo=new THREE.PlaneGeometry(dw*sc,dh*sc);
    const pMat=new THREE.MeshPhongMaterial({
      color:color,transparent:true,opacity:0.04,
      side:THREE.DoubleSide,emissive:color,emissiveIntensity:0.03,
    });
    const plane=new THREE.Mesh(pGeo,pMat);
    plane.rotation.x=-Math.PI/2;plane.position.y=y;
    scene.add(plane);

    // Layer border
    const bGeo=new THREE.EdgesGeometry(pGeo);
    const bMat=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.18});
    const border=new THREE.LineSegments(bGeo,bMat);
    border.rotation.x=-Math.PI/2;border.position.y=y;
    scene.add(border);

    // Layer label — small text sprite
    const canvas=document.createElement('canvas');
    canvas.width=128;canvas.height=48;
    const c2=canvas.getContext('2d');
    c2.fillStyle='transparent';c2.fillRect(0,0,128,48);
    c2.font='bold 28px Inter,sans-serif';
    c2.fillStyle='#'+color.toString(16).padStart(6,'0');
    c2.textAlign='center';c2.textBaseline='middle';
    c2.fillText(SEMI_LAYER_NAMES[l]||('M'+(l+1)),64,24);
    const tex=new THREE.CanvasTexture(canvas);
    const spriteMat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.7});
    const sprite=new THREE.Sprite(spriteMat);
    sprite.scale.set(16,6,1);
    sprite.position.set(-dw*sc/2-12,y,0);
    scene.add(sprite);
  }

  // Wires as 3D metal traces
  const wires=(ph.wires||[]).slice(0,1500);
  for(const w of wires){
    const l=w.layer||0;
    const y=l*layerSpacing;
    const lc=SEMI_LAYER_COLORS[l%SEMI_LAYER_COLORS.length];
    const x1=ox+w.x1*sc, z1=oz+w.y1*sc;
    const x2=ox+w.x2*sc, z2=oz+w.y2*sc;
    const len=Math.sqrt((x2-x1)**2+(z2-z1)**2);
    if(len<0.01)continue;

    // Wire thickness varies by layer (lower=thinner, higher=thicker)
    const thick=0.4+l*0.15;
    const wireH=0.6+l*0.1;
    const wGeo=new THREE.BoxGeometry(len,wireH,thick);
    const wMat=new THREE.MeshPhongMaterial({
      color:lc,transparent:true,opacity:0.6+l*0.05,
      emissive:lc,emissiveIntensity:0.18,
      specular:0xffffff,shininess:80,
    });
    const wMesh=new THREE.Mesh(wGeo,wMat);
    wMesh.position.set((x1+x2)/2,y+wireH/2,(z1+z2)/2);
    wMesh.rotation.y=Math.atan2(z2-z1,x2-x1);
    wMesh.castShadow=true;
    scene.add(wMesh);
  }

  // Vias as glowing cylinders
  const vias=(ph.vias||[]).slice(0,800);
  for(const v of vias){
    const lo=Math.min(v.lower_layer||0,v.upper_layer||0);
    const hi=Math.max(v.lower_layer||0,v.upper_layer||0);
    const y0=lo*layerSpacing;
    const y1=hi*layerSpacing;
    const vH=Math.max(y1-y0,1);

    const vGeo=new THREE.CylinderGeometry(0.35,0.35,vH,8);
    const vMat=new THREE.MeshPhongMaterial({
      color:0xffffff,transparent:true,opacity:0.35,
      emissive:0xaaccff,emissiveIntensity:0.15,
      specular:0xffffff,shininess:100,
    });
    const via=new THREE.Mesh(vGeo,vMat);
    via.position.set(ox+(v.x||0)*sc,(y0+y1)/2,oz+(v.y||0)*sc);
    scene.add(via);
  }
}
