<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiliconForge Studio — RTL-to-GDSII EDA Platform</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --cyan: #39d2c0;
  --sidebar-width: 260px;
  --header-height: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.header {
  height: var(--header-height); background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
}
.header .logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
.header .logo span { color: var(--text-secondary); font-weight: 400; }
.header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-tertiary); color: var(--text-primary); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: #238636; border-color: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.main-layout { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: var(--sidebar-width); background: var(--bg-secondary);
  border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.sidebar-group { border-bottom: 1px solid var(--border); }
.sidebar-group-header {
  padding: 10px 14px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;
}
.sidebar-group-header:hover { color: var(--text-primary); }
.sidebar-group-header .arrow { font-size: 10px; transition: transform 0.2s; }
.sidebar-group.collapsed .arrow { transform: rotate(-90deg); }
.sidebar-group.collapsed .sidebar-items { display: none; }
.sidebar-item {
  padding: 7px 14px 7px 28px; font-size: 13px; color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s;
}
.sidebar-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.sidebar-item.active { background: var(--bg-tertiary); color: var(--accent); border-right: 2px solid var(--accent); }
.sidebar-item .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
.sidebar-item .dot.done { background: var(--green); }
.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.stage-content { flex: 1; overflow-y: auto; padding: 20px; }
.stage-content::-webkit-scrollbar { width: 8px; }
.stage-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.stage-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.stage-header h2 { font-size: 18px; font-weight: 600; }
.stage-header .num { color: var(--text-muted); font-size: 13px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.metric { background: var(--bg-tertiary); border-radius: 6px; padding: 10px; }
.metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
.metric-value { font-size: 18px; font-weight: 700; }
.metric-value.good { color: var(--green); }
.metric-value.warn { color: var(--orange); }
.metric-value.bad { color: var(--red); }
.viz-container { width: 100%; background: var(--bg-primary); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
.viz-container canvas { display: block; width: 100%; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; }
.data-table td { padding: 6px 12px; border-bottom: 1px solid var(--bg-tertiary); }
.flow-progress { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
.flow-chip { font-size: 11px; padding: 3px 8px; border-radius: 12px; border: 1px solid var(--border); color: var(--text-muted); }
.flow-chip.done { border-color: var(--green); color: var(--green); background: rgba(63,185,80,0.1); }
.terminal-panel { height: 180px; background: var(--bg-primary); border-top: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.terminal-header { display: flex; align-items: center; padding: 6px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); gap: 8px; }
.terminal-header span { font-size: 12px; color: var(--text-secondary); }
.terminal-output { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; line-height: 1.5; color: var(--text-secondary); white-space: pre-wrap; }
.terminal-input-row { display: flex; align-items: center; padding: 4px 12px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
.terminal-prompt { color: var(--green); font-family: monospace; font-size: 12px; margin-right: 8px; }
.terminal-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: monospace; font-size: 12px; outline: none; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">SiliconForge <span>Studio</span></div>
  <div class="header-actions">
    <input type="file" id="verilog-upload" accept=".v,.sv" style="display:none" onchange="uploadFile(this)">
    <button class="btn" onclick="document.getElementById('verilog-upload').click()">Upload Verilog</button>
    <button class="btn btn-primary" onclick="runFullFlow()">Run Full Flow</button>
    <button class="btn" onclick="refreshState()">Refresh</button>
  </div>
</div>
<div class="main-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content-area">
    <div class="stage-content" id="stage-content"></div>
    <div class="terminal-panel">
      <div class="terminal-header">
        <span style="color:var(--green)">●</span><span>Terminal</span>
        <button class="btn" style="margin-left:auto;padding:2px 8px;font-size:11px" onclick="clearTerminal()">Clear</button>
      </div>
      <div class="terminal-output" id="terminal-output"></div>
      <div class="terminal-input-row">
        <span class="terminal-prompt">sf&gt;</span>
        <input class="terminal-input" id="terminal-input" placeholder="Enter command..." onkeydown="if(event.key==='Enter')sendTerminalCmd()">
      </div>
    </div>
  </div>
</div>
<script>
let STATE = {};
let currentStage = 'dashboard';
let currentDesignFile = 'test_design.v';

const STAGE_GROUPS = [
  { name: 'Overview', stages: [
    { id: 'dashboard', label: 'Dashboard', cmd: null },
  ]},
  { name: 'RTL & Frontend', stages: [
    { id: 'rtl', label: 'RTL Design', cmd: 'read_verilog ' },
    { id: 'simulation', label: 'Simulation', cmd: 'simulate' },
    { id: 'formal', label: 'Formal Verification', cmd: 'formal_bmc 10' },
    { id: 'synthesis', label: 'Logic Synthesis', cmd: 'synthesize' },
    { id: 'dft', label: 'Design for Test', cmd: 'run_dft' },
    { id: 'lec', label: 'LEC', cmd: 'lec' },
  ]},
  { name: 'Physical Design', stages: [
    { id: 'placement', label: 'Placement', cmd: 'floorplan 200 200 10' },
    { id: 'cts', label: 'Clock Tree Synthesis', cmd: 'cts' },
    { id: 'routing', label: 'Routing', cmd: 'route' },
    { id: 'post_route', label: 'Post-Route Opt', cmd: 'post_route_opt' },
    { id: 'chip', label: 'Chip Assembly', cmd: 'chip_assemble' },
  ]},
  { name: 'Signoff', stages: [
    { id: 'sta', label: 'Static Timing', cmd: 'sta' },
    { id: 'power', label: 'Power Analysis', cmd: 'power' },
    { id: 'drc', label: 'DRC', cmd: 'drc' },
    { id: 'lvs', label: 'LVS', cmd: 'lvs' },
  ]},
  { name: 'Advanced Analysis', stages: [
    { id: 'mcmm', label: 'MCMM Signoff', cmd: 'mcmm' },
    { id: 'ssta', label: 'SSTA & Yield', cmd: 'ssta' },
    { id: 'ir_drop', label: 'IR Drop', cmd: 'ir_drop' },
    { id: 'pdn', label: 'PDN Impedance', cmd: 'pdn' },
    { id: 'si', label: 'Signal Integrity', cmd: 'si' },
    { id: 'thermal', label: 'Thermal Analysis', cmd: 'thermal' },
    { id: 'em', label: 'Electromigration', cmd: 'em' },
    { id: 'noise', label: 'Noise / SSN', cmd: 'noise' },
    { id: 'ml', label: 'ML Optimization', cmd: 'ai_tune' },
    { id: 'adv_formal', label: 'Advanced Formal', cmd: 'adv_formal' },
  ]},
  { name: 'Output', stages: [
    { id: 'gdsii', label: 'GDSII Export', cmd: 'write_gds out.gds' },
  ]},
];

const STAGE_STATE_MAP = {
  rtl:'has_netlist', simulation:'is_simulated', formal:'is_formal_done',
  synthesis:'is_synthesized', dft:'is_dft_done', lec:'is_lec_done',
  placement:'is_placed', cts:'is_cts_done', routing:'is_routed',
  post_route:'is_post_route_done', chip:'is_chip_assembled',
  sta:'is_sta_done', power:'is_power_done', drc:'is_drc_done', lvs:'is_lvs_done',
  mcmm:'is_mcmm_done', ssta:'is_ssta_done', ir_drop:'is_ir_drop_done',
  pdn:'is_pdn_done', si:'is_si_done', thermal:'is_thermal_done',
  em:'is_em_done', noise:'is_noise_done', ml:'is_ml_done', adv_formal:'is_adv_formal_done',
};

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  for (const group of STAGE_GROUPS) {
    const gDiv = document.createElement('div');
    gDiv.className = 'sidebar-group';
    const hdr = document.createElement('div');
    hdr.className = 'sidebar-group-header';
    hdr.innerHTML = '<span class="arrow">▾</span> ' + group.name;
    hdr.onclick = function() { gDiv.classList.toggle('collapsed'); };
    gDiv.appendChild(hdr);
    const items = document.createElement('div');
    items.className = 'sidebar-items';
    for (const s of group.stages) {
      const item = document.createElement('div');
      item.className = 'sidebar-item' + (s.id === currentStage ? ' active' : '');
      item.dataset.id = s.id;
      const stateKey = STAGE_STATE_MAP[s.id];
      const isDone = stateKey && STATE.flow_state && STATE.flow_state[stateKey];
      item.innerHTML = '<span class="dot ' + (isDone ? 'done' : '') + '"></span>' + s.label;
      item.onclick = function() { selectStage(s.id); };
      items.appendChild(item);
    }
    gDiv.appendChild(items);
    sb.appendChild(gDiv);
  }
}

function selectStage(id) {
  currentStage = id;
  document.querySelectorAll('.sidebar-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });
  renderStage();
}

function renderStage() {
  var el = document.getElementById('stage-content');
  var fn = RENDERERS[currentStage];
  if (fn) { el.innerHTML = ''; fn(el); }
  else { el.innerHTML = '<div class="card"><p style="color:var(--text-secondary)">Select a stage.</p></div>'; }
}

// API
async function apiCommand(cmd) {
  appendTerminal('> ' + cmd);
  try {
    var r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({command:cmd}) });
    var d = await r.json();
    if (d.output) appendTerminal(d.output);
    if (d.state) { STATE = d.state; buildSidebar(); renderStage(); }
    return d;
  } catch(e) { appendTerminal('[ERROR] ' + e.message); }
}

async function refreshState() {
  try {
    var r = await fetch('/api/state');
    STATE = await r.json();
    buildSidebar(); renderStage();
    appendTerminal('[State refreshed]');
  } catch(e) { appendTerminal('[ERROR] ' + e.message); }
}

async function uploadFile(input) {
  var file = input.files[0];
  if (!file) return;
  currentDesignFile = file.name;
  var form = new FormData();
  form.append('file', file);
  try {
    await fetch('/api/upload', { method:'POST', body:form });
    appendTerminal('[Uploaded] ' + file.name);
    await apiCommand('read_verilog studio/' + file.name);
  } catch(e) { appendTerminal('[ERROR] ' + e.message); }
}

async function runFullFlow() {
  appendTerminal('[Running full RTL-to-GDSII flow...]');
  await apiCommand('run_all 200 200');
}

function appendTerminal(text) {
  var el = document.getElementById('terminal-output');
  el.textContent += text + '\n';
  el.scrollTop = el.scrollHeight;
}
function clearTerminal() { document.getElementById('terminal-output').textContent = ''; }
function sendTerminalCmd() {
  var inp = document.getElementById('terminal-input');
  var cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  apiCommand(cmd);
}

// Helpers
function mc(label, value, cls) {
  return '<div class="metric"><div class="metric-label">' + label + '</div><div class="metric-value ' + (cls||'') + '">' + value + '</div></div>';
}

function stageHdr(num, title, cmd) {
  var s = '<div class="stage-header"><span class="num">#' + num + '</span><h2>' + title + '</h2>';
  if (cmd) s += '<button class="btn btn-primary" style="margin-left:auto" onclick="apiCommand(\'' + cmd.replace(/'/g,"\\'") + '\')">Run</button>';
  s += '</div>';
  return s;
}

function makeCanvas(id, w, h) {
  return '<div class="viz-container"><canvas id="' + id + '" width="' + w + '" height="' + h + '"></canvas></div>';
}

// RENDERERS
var RENDERERS = {};

RENDERERS.dashboard = function(el) {
  var fs = STATE.flow_state || {};
  var allStages = Object.entries(STAGE_STATE_MAP);
  var doneCount = allStages.filter(function(e) { return fs[e[1]]; }).length;
  var html = '<div class="stage-header"><h2>Design Overview</h2></div>';
  html += '<div class="card"><div class="card-title">Flow Progress — ' + doneCount + '/' + allStages.length + ' stages</div><div class="flow-progress">';
  var allStageList = [];
  STAGE_GROUPS.forEach(function(g) { g.stages.forEach(function(s) { allStageList.push(s); }); });
  for (var e of allStages) {
    var info = allStageList.find(function(s) { return s.id === e[0]; });
    html += '<span class="flow-chip ' + (fs[e[1]] ? 'done' : '') + '">' + (info ? info.label : e[0]) + '</span>';
  }
  html += '</div></div>';
  var nl = STATE.netlist || {}, t = STATE.timing || {}, p = STATE.power || {}, ph = STATE.physical || {}, drc = STATE.drc || {};
  html += '<div class="card"><div class="card-title">Key Metrics</div><div class="metric-grid">';
  html += mc('Gates', nl.num_gates||0) + mc('Nets', nl.num_nets||0) + mc('Flip-Flops', nl.num_ffs||0);
  html += mc('WNS (ns)', (t.wns||0).toFixed(3), (t.wns||0)>=0?'good':'bad');
  html += mc('TNS (ns)', (t.tns||0).toFixed(3), (t.tns||0)>=0?'good':'warn');
  html += mc('Power (mW)', (p.total_mw||0).toFixed(2));
  html += mc('Cells', ph.num_cells||0) + mc('Wires', ph.num_wires||0);
  html += mc('DRC Violations', drc.violations||0, (drc.violations||0)===0?'good':'bad');
  html += '</div></div>';
  el.innerHTML = html;
};

RENDERERS.rtl = function(el) {
  var nl = STATE.netlist || {};
  var html = stageHdr('01','RTL Design','read_verilog '+currentDesignFile);
  html += '<div class="card"><div class="card-title">Netlist</div><div class="metric-grid">';
  html += mc('Gates',nl.num_gates||0)+mc('Nets',nl.num_nets||0)+mc('PIs',nl.num_pis||0)+mc('POs',nl.num_pos||0)+mc('FFs',nl.num_ffs||0);
  html += '</div></div>';
  if (nl.gates && nl.gates.length > 0) html += '<div class="card"><div class="card-title">Gate Graph</div>' + makeCanvas('c-rtl',800,350) + '</div>';
  el.innerHTML = html;
  if (nl.gates && nl.gates.length > 0) drawRtlGraph(document.getElementById('c-rtl'), nl);
};

RENDERERS.simulation = function(el) {
  var sim = STATE.simulation || {};
  var html = stageHdr('02','Simulation','simulate');
  if (sim.num_signals > 0) {
    html += '<div class="card"><div class="card-title">Waveforms — '+sim.num_signals+' signals, '+sim.num_timepoints+' timepoints</div>'+makeCanvas('c-sim',800,Math.max(200,(sim.signals||[]).length*30+40))+'</div>';
    el.innerHTML = html;
    drawWaveform(document.getElementById('c-sim'), sim);
  } else {
    html += '<div class="card"><p style="color:var(--text-secondary)">No simulation data yet.</p></div>';
    el.innerHTML = html;
  }
};

RENDERERS.formal = function(el) {
  var f = STATE.formal || {};
  var html = stageHdr('03','Formal Verification','formal_bmc 10');
  html += '<div class="card"><div class="card-title">BMC — Depth ' + (f.bmc_depth||0) + '</div>';
  if (f.properties && f.properties.length) {
    html += '<table class="data-table"><thead><tr><th>Property</th><th>Status</th><th>Depth</th><th>CEX</th></tr></thead><tbody>';
    for (var p of f.properties) {
      var c = p.status==='proved'?'var(--green)':p.status==='failed'?'var(--red)':'var(--orange)';
      html += '<tr><td>'+p.name+'</td><td style="color:'+c+'">'+p.status+'</td><td>'+p.depth+'</td><td>'+p.cex_cycle+'</td></tr>';
    }
    html += '</tbody></table>';
  } else html += '<p style="color:var(--text-secondary)">No properties yet.</p>';
  html += '</div>';
  el.innerHTML = html;
};

RENDERERS.synthesis = function(el) {
  var s = STATE.synthesis || {};
  var html = stageHdr('04','Logic Synthesis','synthesize');
  html += '<div class="card"><div class="card-title">Results</div><div class="metric-grid">';
  html += mc('Nodes Before',s.nodes_before||0)+mc('Nodes After',s.nodes_after||0);
  html += mc('Depth Before',s.depth_before||0)+mc('Depth After',s.depth_after||0);
  html += mc('Reduction',(s.reduction_pct||0).toFixed(1)+'%','good');
  html += '</div></div>';
  html += '<div class="card"><div class="card-title">Optimization</div>'+makeCanvas('c-synth',500,200)+'</div>';
  el.innerHTML = html;
  drawBarComp(document.getElementById('c-synth'),[{l:'Nodes',b:s.nodes_before||0,a:s.nodes_after||0},{l:'Depth',b:s.depth_before||0,a:s.depth_after||0}]);
};

RENDERERS.dft = function(el) {
  var d = STATE.dft || {};
  var html = stageHdr('05','Design for Test','run_dft');
  html += '<div class="card"><div class="card-title">Fault Coverage</div><div class="metric-grid">';
  html += mc('Total Faults',d.total_faults||0)+mc('Detected',d.detected||0,'good');
  html += mc('Coverage',(d.coverage_pct||0).toFixed(1)+'%',(d.coverage_pct||0)>90?'good':'warn');
  html += mc('Patterns',d.patterns||0);
  html += '</div></div>';
  el.innerHTML = html;
};

RENDERERS.lec = function(el) {
  var fs = STATE.flow_state || {};
  var html = stageHdr('06','Logic Equivalence Checking','lec');
  html += '<div class="card"><div class="card-title">LEC Status</div>';
  html += '<p style="color:'+(fs.is_lec_done?'var(--green)':'var(--text-secondary)')+';font-size:16px">'+(fs.is_lec_done?'✓ Equivalence verified':'Not run yet')+'</p></div>';
  el.innerHTML = html;
};

RENDERERS.placement = function(el) {
  var ph = STATE.physical || {};
  var html = stageHdr('07','Cell Placement','floorplan 200 200 10');
  html += '<div class="card"><div class="card-title">Placement</div><div class="metric-grid">';
  html += mc('Die',((ph.die||{}).w||0)+' × '+((ph.die||{}).h||0));
  html += mc('Cells',ph.num_cells||0)+mc('Utilization',((ph.utilization||0)*100).toFixed(1)+'%');
  html += '</div></div>';
  if (ph.cells && ph.cells.length) {
    html += '<div class="card"><div class="card-title">Cell Map</div>'+makeCanvas('c-place',600,500)+'</div>';
    el.innerHTML = html;
    drawPlacement(document.getElementById('c-place'), ph);
  } else el.innerHTML = html;
};

RENDERERS.cts = function(el) {
  var c = STATE.cts || {};
  var html = stageHdr('08','Clock Tree Synthesis','cts');
  html += '<div class="card"><div class="card-title">CTS Results</div><div class="metric-grid">';
  html += mc('Buffers',c.buffers_inserted||0)+mc('Wirelength',(c.wirelength||0).toFixed(1));
  html += mc('Skew (ps)',(c.skew||0).toFixed(2),(c.skew||0)<50?'good':'warn');
  html += mc('Max Latency',(c.max_latency||0).toFixed(1))+mc('Min Latency',(c.min_latency||0).toFixed(1));
  html += '</div></div>';
  el.innerHTML = html;
};

RENDERERS.routing = function(el) {
  var ph = STATE.physical || {};
  var html = stageHdr('09','Routing','route');
  html += '<div class="card"><div class="card-title">Routing</div><div class="metric-grid">';
  html += mc('Wires',ph.num_wires||0)+mc('Vias',ph.num_vias||0)+mc('Layers',ph.num_layers||0)+mc('Wirelength',(ph.wirelength||0).toFixed(0));
  html += '</div></div>';
  if (ph.wires && ph.wires.length) {
    html += '<div class="card"><div class="card-title">Route Map</div>'+makeCanvas('c-route',600,500)+'</div>';
    el.innerHTML = html;
    drawRouting(document.getElementById('c-route'), ph);
  } else el.innerHTML = html;
};

RENDERERS.post_route = function(el) {
  var pr = STATE.post_route || {};
  var html = stageHdr('10','Post-Route Optimization','post_route_opt');
  html += '<div class="card"><div class="card-title">Results</div><div class="metric-grid">';

// CANVAS DRAWING FUNCTIONS

function drawRtlGraph(canvas, nl) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var gates = nl.gates || [];
  if (!gates.length) return;
  var N = Math.min(gates.length, 60);
  var cols = Math.ceil(Math.sqrt(N*1.5)), rows = Math.ceil(N/cols);
  var cw = W/(cols+1), ch = H/(rows+1);
  var colors = {AND:'#58a6ff',OR:'#3fb950',NOT:'#f85149',XOR:'#bc8cff',NAND:'#d29922',NOR:'#39d2c0',DFF:'#f778ba',BUF:'#8b949e',INPUT:'#3fb950',OUTPUT:'#f85149',MUX:'#d29922'};
  for (var i = 0; i < N; i++) {
    var g = gates[i], col = i%cols, row = Math.floor(i/cols);
    var x = (col+0.5)*cw+20, y = (row+0.5)*ch+20;
    var color = colors[g.type]||'#58a6ff';
    ctx.fillStyle = color+'22'; ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(x-24,y-14,48,28,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = color; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(g.type, x, y);
  }
}

function drawWaveform(canvas, sim) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var sigs = sim.signals||[], times = sim.times||[];
  if (!sigs.length || !times.length) return;
  var nw = 80, pw = W-nw-20, sh = 24;
  var tMin = times[0], tMax = times[times.length-1]||1, tS = pw/((tMax-tMin)||1);
  for (var si = 0; si < sigs.length; si++) {
    var sig = sigs[si], by = 20+si*(sh+6);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(sig.name.slice(0,10), nw-8, by+sh/2);
    ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5; ctx.beginPath();
    for (var t = 0; t < sig.values.length && t < times.length; t++) {
      var x = nw+(times[t]-tMin)*tS, y = sig.values[t]?by+2:by+sh-2;
      if (t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

function drawPlacement(canvas, phys) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var dw = (phys.die||{}).w||200, dh = (phys.die||{}).h||200;
  var scale = Math.min((W-40)/dw,(H-40)/dh), ox = 20, oy = 20;
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 2; ctx.strokeRect(ox,oy,dw*scale,dh*scale);
  for (var c of (phys.cells||[])) {
    var x=ox+c.x*scale, y=oy+c.y*scale, w=(c.w||2)*scale, ht=(c.h||10)*scale;
    ctx.fillStyle = '#58a6ff33'; ctx.strokeStyle = '#58a6ff88'; ctx.lineWidth = 0.5;
    ctx.fillRect(x,y,w,ht); ctx.strokeRect(x,y,w,ht);
  }
}

function drawRouting(canvas, phys) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var dw = (phys.die||{}).w||200, dh = (phys.die||{}).h||200;
  var scale = Math.min((W-40)/dw,(H-40)/dh), ox = 20, oy = 20;
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 2; ctx.strokeRect(ox,oy,dw*scale,dh*scale);
  var lc = ['#58a6ff','#3fb950','#f85149','#bc8cff','#d29922','#39d2c0','#f778ba','#8b949e'];
  for (var w of (phys.wires||[])) {
    ctx.strokeStyle = (lc[w.layer%lc.length])+'88';
    ctx.lineWidth = Math.max(0.5,(w.width||1)*scale*0.5);
    ctx.beginPath(); ctx.moveTo(ox+w.x1*scale,oy+w.y1*scale); ctx.lineTo(ox+w.x2*scale,oy+w.y2*scale); ctx.stroke();
  }
}

function drawBarComp(canvas, items) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var ml=60,mr=20,mt=25,mb=40, pw=W-ml-mr, ph=H-mt-mb;
  var n = items.length, gw = pw/n, bw = gw*0.3;
  var mx = Math.max.apply(null, items.map(function(i){return Math.max(Math.abs(i.b),Math.abs(i.a));})) || 1;
  for (var i = 0; i < n; i++) {
    var cx = ml+(i+0.5)*gw;
    ctx.fillStyle = '#f8514966'; ctx.fillRect(cx-bw-2,H-mb-(Math.abs(items[i].b)/mx)*ph,bw,(Math.abs(items[i].b)/mx)*ph);
    ctx.fillStyle = '#3fb95066'; ctx.fillRect(cx+2,H-mb-(Math.abs(items[i].a)/mx)*ph,bw,(Math.abs(items[i].a)/mx)*ph);
    ctx.fillStyle = '#8b949e'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(items[i].l, cx, H-mb+15);
  }
  ctx.fillStyle='#f8514966';ctx.fillRect(ml,5,10,10);ctx.fillStyle='#8b949e';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('Before',ml+14,14);
  ctx.fillStyle='#3fb95066';ctx.fillRect(ml+60,5,10,10);ctx.fillStyle='#8b949e';ctx.fillText('After',ml+74,14);
}

function drawYieldCurve(canvas, sy) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var entries = Object.entries(sy).map(function(e){return [parseFloat(e[0]),e[1]];}).sort(function(a,b){return a[0]-b[0];});
  if (!entries.length) return;
  var m={l:50,r:20,t:20,b:40}, pw=W-m.l-m.r, ph=H-m.t-m.b;
  var xMin=entries[0][0], xMax=entries[entries.length-1][0], xR=xMax-xMin||1;
  ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,H-m.b);ctx.lineTo(W-m.r,H-m.b);ctx.stroke();
  ctx.strokeStyle='#3fb950';ctx.lineWidth=2;ctx.beginPath();
  for (var i=0;i<entries.length;i++) {
    var x=m.l+((entries[i][0]-xMin)/xR)*pw, y=m.t+(1-entries[i][1]/100)*ph;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  for (var e of entries) { var x=m.l+((e[0]-xMin)/xR)*pw,y=m.t+(1-e[1]/100)*ph; ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill(); }
  ctx.fillStyle='#8b949e';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('Sigma',W/2,H-5);
}

function drawHeatmap(canvas, map2d, title) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  if (!map2d.length || !map2d[0].length) return;
  var ny=map2d.length, nx=map2d[0].length, mg=30;
  var cw=(W-2*mg)/nx, ch=(H-2*mg)/ny;
  var minV=Infinity, maxV=-Infinity;
  for (var row of map2d) for (var v of row) { if(v<minV)minV=v; if(v>maxV)maxV=v; }
  var range = maxV-minV||1;
  for (var y=0;y<ny;y++) for (var x=0;x<nx;x++) {
    var t=(map2d[y][x]-minV)/range;
    var r=Math.floor(t*255), b=Math.floor((1-t)*255), g=Math.floor((t<0.5?t*2:(1-t)*2)*200);
    ctx.fillStyle='rgb('+r+','+g+','+b+')';
    ctx.fillRect(mg+x*cw, mg+y*ch, cw+1, ch+1);
  }
  ctx.fillStyle='#8b949e';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText(title||'',W/2,18);
  ctx.fillText('Min: '+minV.toFixed(1),mg+40,H-8);
  ctx.fillText('Max: '+maxV.toFixed(1),W-mg-40,H-8);
}

function drawImpedancePlot(canvas, pdn) {
  var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);
  var pts = pdn.impedance_profile;
  if (!pts.length) return;
  var m={l:60,r:20,t:20,b:40}, pw=W-m.l-m.r, ph=H-m.t-m.b;
  var maxZ = Math.max.apply(null,pts.map(function(p){return p.impedance_mohm;}));
  maxZ = Math.max(maxZ, pdn.target_impedance_mohm||1);
  ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.l,m.t);ctx.lineTo(m.l,H-m.b);ctx.lineTo(W-m.r,H-m.b);ctx.stroke();
  if (pdn.target_impedance_mohm > 0) {
    var ty = m.t+(1-pdn.target_impedance_mohm/maxZ)*ph;
    ctx.strokeStyle='#f8514966';ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(m.l,ty);ctx.lineTo(W-m.r,ty);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f85149';ctx.font='10px sans-serif';ctx.fillText('Target',W-m.r-35,ty-5);
  }
  ctx.strokeStyle='#58a6ff';ctx.lineWidth=2;ctx.beginPath();
  for (var i=0;i<pts.length;i++) {
    var x=m.l+(i/(pts.length-1||1))*pw, y=m.t+(1-pts[i].impedance_mohm/maxZ)*ph;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
}

// Init
buildSidebar();
renderStage();
refreshState();
</script>
